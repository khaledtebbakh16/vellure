        // ============================================================
        //  CHECKOUT MODAL
        // ============================================================
        function CheckoutModal({ open, onClose, cart, setCart, settings, onOrderComplete }) {
            const toast = useToast();
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({ name: '', phone: '', wilaya: '', commune: '', delivery: 'Yalidine', payment: 'cod', discountCode: '', otherDelivery: '' });
            const [discount, setDiscount] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [trackingId, setTrackingId] = useState(null);
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const discountAmount = discount ? Math.round(subtotal * discount.percent / 100) : 0;
            const total = subtotal - discountAmount;
            const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
            const applyDiscount = () => {
                const code = form.discountCode.trim().toUpperCase();
                const found = (settings.discountCodes || []).find(c => c.code.toUpperCase() === code);
                if (found) { setDiscount(found);
                    toast(`خصم ${found.percent}%`, 'success'); } else { setDiscount(null);
                    toast('كود غير صالح', 'error'); }
            };
            const canNext = () => {
                if (step === 0) return form.name.trim().length >= 2 && form.phone.trim().length >= 9;
                if (step === 1) return form.wilaya && form.commune.trim().length >= 2 && form.delivery;
                if (step === 2) return form.payment;
                return true;
            };

            const submitOrder = async () => {
                setSubmitting(true);
                const tid = generateTrackingId();
                const order = {
                    id: generateId('ord'),
                    trackingId: tid,
                    customer: { name: form.name.trim(), phone: form.phone.trim() },
                    delivery: { wilaya: form.wilaya, commune: form.commune.trim(), company: form.delivery === 'أخرى' ? form.otherDelivery || 'أخرى' : form.delivery },
                    payment: form.payment,
                    discount,
                    items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
                    subtotal,
                    discountAmount,
                    total,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                };

                try {
                    // قراءة الطلبات الحالية من Firebase ثم إضافة الطلب الجديد
                    const currentOrdersSnap = await db.ref('orders').once('value');
                    const currentOrders = currentOrdersSnap.val() || [];
                    currentOrders.unshift(order);
                    await db.ref('orders').set(currentOrders);

                    // تحديث المخزون في Firebase
                    const cats = await db.ref('categories').once('value');
                    const catsData = cats.val() || [];
                    for (const item of cart) {
                        for (const cat of catsData) {
                            const prodsSnap = await db.ref(`products/${cat.id}`).once('value');
                            const prods = prodsSnap.val() || [];
                            const idx = prods.findIndex(p => p.id === item.id);
                            if (idx >= 0) {
                                prods[idx].stock = Math.max(0, (prods[idx].stock || 0) - item.qty);
                                await db.ref(`products/${cat.id}`).set(prods);
                                break;
                            }
                        }
                    }

                    setTrackingId(tid);
                    setCart([]);
                    if (onOrderComplete) onOrderComplete();
                    toast('تم تأكيد طلبك!', 'success');
                } catch (error) {
                    toast('فشل في حفظ الطلب: ' + error.message, 'error');
                } finally {
                    setSubmitting(false);
                }
            };

            const steps = ['بيانات الزبون', 'التوصيل', 'الدفع', 'المراجعة'];
            if (trackingId) {
                return ( <Modal open={open} onClose={onClose} title="تم تأكيد الطلب">
                    <div className="text-center py-6">
                        <div className="w-20 h-20 rounded-full bg-primary flex items-center justify-center mx-auto mb-4"><Icon name="checkCircle" size={40} className="text-white" /></div>
                        <h3 className="font-cairo text-xl font-bold mb-2">شكراً لطلبك!</h3>
                        <p className="text-gray-400 text-sm mb-4">رقم التتبع:</p>
                        <div className="bg-ink-card border-2 border-dashed border-primary rounded-xl p-4 mb-4"><p className="track-code font-mono text-2xl text-primary font-bold">{trackingId}</p></div>
                        <button onClick={onClose} className="btn-primary rounded-xl px-8 py-3">حسناً</button>
                    </div>
                </Modal>
                );
            }
            return ( <Modal open={open} onClose={onClose} title="إتمام الطلب">
                <div className="space-y-4">
                    <div className="flex items-center justify-between mb-4">
                        {steps.map((s, i) => (
                            <div key={i} className="flex items-center gap-2">
                                <div className={`step-dot w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold font-mono ${i === step ? 'active' : i < step ? 'step-done' : 'bg-ink-border text-gray-500'}`}>
                                    {i < step ? <Icon name="check" size={14} /> : i + 1}
                                </div>
                                <span className={`text-[10px] ${i === step ? 'text-primary' : 'text-gray-500'}`}>{s}</span>
                                {i < steps.length - 1 && <div className={`w-8 h-0.5 mx-1 ${i < step ? 'bg-primary' : 'bg-ink-border'}`} />}
                            </div>
                        ))}
                    </div>
                    {step === 0 && (
                        <div className="space-y-3">
                            <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="الاسم الكامل *" />
                            <input type="tel" value={form.phone} onChange={e => set('phone', e.target.value)} placeholder="رقم الهاتف *" dir="ltr" className="text-left" />
                        </div>
                    )}
                    {step === 1 && (
                        <div className="space-y-3">
                            <select value={form.wilaya} onChange={e => set('wilaya', e.target.value)}><option value="">الولاية *</option>{WILAYAS.map(w => <option key={w} value={w}>{w}</option>)}</select>
                            <input value={form.commune} onChange={e => set('commune', e.target.value)} placeholder="البلدية *" />
                            <div className="grid grid-cols-2 gap-2">
                                {DELIVERY_COMPANIES.map(c => (
                                    <button key={c} type="button" onClick={() => set('delivery', c)} className={`py-2 rounded-lg border text-sm ${form.delivery === c ? 'border-primary bg-primary/10 text-primary' : 'border-ink-border text-gray-400'}`}>{c}</button>
                                ))}
                            </div>
                            {form.delivery === 'أخرى' && <input value={form.otherDelivery} onChange={e => set('otherDelivery', e.target.value)} placeholder="اسم الشركة" />}
                        </div>
                    )}
                    {step === 2 && (
                        <div className="space-y-3">
                            <div className="space-y-2">
                                <button type="button" onClick={() => set('payment', 'cod')} className={`w-full p-4 rounded-xl border text-right ${form.payment === 'cod' ? 'border-primary bg-primary/10' : 'border-ink-border'}`}>
                                    <div className="font-semibold">الدفع عند الاستلام</div>
                                    <div className="text-xs text-gray-400">ادفع نقداً عند الاستلام</div>
                                </button>
                                <button type="button" onClick={() => set('payment', 'ccp')} className={`w-full p-4 rounded-xl border text-right ${form.payment === 'ccp' ? 'border-primary bg-primary/10' : 'border-ink-border'}`}>
                                    <div className="font-semibold">تحويل CCP</div>
                                    <div className="text-xs text-gray-400">حوّل المبلغ عبر حساب CCP</div>
                                </button>
                            </div>
                            {form.payment === 'ccp' && (
                                <div className="p-4 rounded-xl bg-ink-card border border-dashed border-primary">
                                    <p className="text-xs text-gray-400 mb-1">رقم حساب CCP</p>
                                    <p className="font-mono text-primary text-lg font-bold">{settings.ccpAccount}</p>
                                    <p className="text-xs text-gray-400 mt-2">اسم صاحب الحساب</p>
                                    <p className="font-semibold">{settings.ccpName}</p>
                                </div>
                            )}
                            <div>
                                <label className="text-sm text-gray-300">كود خصم (اختياري)</label>
                                <div className="flex gap-2 mt-1">
                                    <input value={form.discountCode} onChange={e => set('discountCode', e.target.value)} placeholder="أدخل الكود" />
                                    <button onClick={applyDiscount} className="btn-outline-primary rounded-lg px-4 text-sm shrink-0">تطبيق</button>
                                </div>
                                {discount && <p className="text-green-400 text-xs mt-1">خصم {discount.percent}%</p>}
                            </div>
                        </div>
                    )}
                    {step === 3 && (
                        <div className="space-y-3">
                            <div className="p-4 rounded-xl bg-ink-card border border-ink-border space-y-1 text-sm">
                                <div className="flex justify-between"><span className="text-gray-400">الاسم</span><span>{form.name}</span></div>
                                <div className="flex justify-between"><span className="text-gray-400">الهاتف</span><span className="font-mono" dir="ltr">{form.phone}</span></div>
                                <div className="flex justify-between"><span className="text-gray-400">العنوان</span><span>{form.commune}، {form.wilaya}</span></div>
                                <div className="flex justify-between"><span className="text-gray-400">التوصيل</span><span>{form.delivery === 'أخرى' ? form.otherDelivery : form.delivery}</span></div>
                                <div className="flex justify-between"><span className="text-gray-400">الدفع</span><span>{form.payment === 'cod' ? 'عند الاستلام' : 'تحويل CCP'}</span></div>
                            </div>
                            <div className="space-y-1">
                                {cart.map(i => <div key={i.id} className="flex justify-between text-sm"><span>{i.name} × {i.qty}</span><span className="font-mono text-primary">{formatPrice(i.price * i.qty)}</span></div>)}
                            </div>
                            <div className="border-t border-ink-border pt-3 space-y-1">
                                <div className="flex justify-between text-sm"><span className="text-gray-400">المجموع الفرعي</span><span className="font-mono">{formatPrice(subtotal)} دج</span></div>
                                {discount && <div className="flex justify-between text-sm text-green-400"><span>خصم ({discount.percent}%)</span><span className="font-mono">-{formatPrice(discountAmount)} دج</span></div>}
                                <div className="flex justify-between font-bold text-base"><span>الإجمالي</span><span className="font-mono text-primary text-lg">{formatPrice(total)} دج</span></div>
                            </div>
                        </div>
                    )}
                    <div className="flex gap-3 pt-2">
                        {step > 0 && <button onClick={() => setStep(s => s - 1)} className="btn-outline-primary rounded-xl px-5 py-2.5 text-sm flex items-center gap-1"><Icon name="chevronRight" size={16} /> السابق</button>}
                        {step < 3 ? (
                            <button disabled={!canNext()} onClick={() => setStep(s => s + 1)} className={`flex-1 btn-primary rounded-xl py-2.5 text-sm ${!canNext() ? 'opacity-40 cursor-not-allowed' : ''}`}>
                                التالي <Icon name="chevronLeft" size={16} />
                            </button>
                        ) : (
                            <button disabled={submitting} onClick={submitOrder} className="flex-1 btn-primary rounded-xl py-2.5 text-sm flex items-center justify-center gap-2">
                                {submitting ? 'جاري التأكيد...' : 'تأكيد الطلب'} <Icon name="check" size={16} />
                            </button>
                        )}
                    </div>
                </div>
            </Modal>
            );
        }

        // ============================================================
        //  HELPERS
        // ============================================================
        const formatPrice = (n) => (n != null && !isNaN(n)) ? Number(n).toLocaleString('fr-DZ') : '0';
        const generateTrackingId = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = 'VR-';
            for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        };
        const generateId = (prefix = 'id') => prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

        function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width,
                            h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w;
                            w = maxWidth; }
                        if (h > maxWidth) { w = (w * maxWidth) / h;
                            h = maxWidth; }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#1A1A1A';
                        ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        canvas.width = 0;
                        canvas.height = 0;
                        if (dataUrl.length > 400000 && quality > 0.4) {
                            const lower = canvas.toDataURL('image/jpeg', 0.4);
                            resolve(lower);
                        } else {
                            resolve(dataUrl);
                        }
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ============================================================
        //  ADMIN PANEL (Hidden in Sidebar)
        // ============================================================
        function AdminPanel({ open, onClose, onDataChange }) {
            const toast = useToast();
            const [authed, setAuthed] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [tab, setTab] = useState('products');
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [hero, setHero] = useState(DEFAULT_HERO);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [orders, setOrders] = useState([]);
            const [products, setProducts] = useState({});
            const [editingProduct, setEditingProduct] = useState(null);
            const [editingCat, setEditingCat] = useState(null);
            const [newCatName, setNewCatName] = useState('');
            const [saving, setSaving] = useState(false);
            const [newPin, setNewPin] = useState('');
            const [confirmPin, setConfirmPin] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [selectedCat, setSelectedCat] = useState('');

            // استماع لجميع التغييرات من Firebase
            useEffect(() => {
                if (!db) return;
                if (open && authed) {
                    const refs = ['categories', 'products', 'orders', 'settings', 'hero'].map(path => db.ref(path));
                    const handlers = [
                        s => setCategories(s.val() || DEFAULT_CATEGORIES),
                        s => setProducts(s.val() || {}),
                        s => setOrders(s.val() || []),
                        s => setSettings(s.val() || DEFAULT_SETTINGS),
                        s => setHero(s.val() || DEFAULT_HERO)
                    ];
                    refs.forEach((ref, i) => ref.on('value', handlers[i]));
                    return () => refs.forEach((ref, i) => ref.off('value', handlers[i]));
                }
            }, [open, authed]);

            useEffect(() => {
                if (!open) { setAuthed(false);
                    setPinInput('');
                    setTab('products');
                    setEditingProduct(null); }
            }, [open]);

            const handleLogin = () => {
                const pin = settings.pin;
                if (pinInput === pin) { setAuthed(true);
                    setPinInput(''); } else toast('الرمز غير صحيح', 'error');
            };

            const saveToFirebase = async (path, data) => {
                setSaving(true);
                try {
                    await db.ref(path).set(data);
                    toast('تم الحفظ بنجاح', 'success');
                    if (onDataChange) onDataChange();
                    return true;
                } catch (e) {
                    toast('فشل الحفظ: ' + e.message, 'error');
                    return false;
                } finally {
                    setSaving(false);
                }
            };

            // Categories
            const addCategory = async () => {
                if (!newCatName.trim()) return;
                const cat = { id: generateId('cat'), name: newCatName.trim(), order: categories.length };
                const updated = [...categories, cat];
                if (await saveToFirebase('categories', updated)) {
                    await db.ref('products/' + cat.id).set([]);
                    setNewCatName('');
                }
            };
            const renameCategory = async (id, name) => {
                const updated = categories.map(c => c.id === id ? { ...c, name } : c);
                if (await saveToFirebase('categories', updated)) { setEditingCat(null); }
            };
            const deleteCategory = async (id) => {
                if (!confirm('حذف الفئة وجميع منتجاتها؟')) return;
                const updated = categories.filter(c => c.id !== id);
                if (await saveToFirebase('categories', updated)) {
                    await db.ref('products/' + id).remove();
                }
            };

            // Products
            const emptyProduct = () => ({ id: generateId('p'), name: '', price: 0, description: '', images: [], mainImage: 0, stock: 0,
                bestSeller: false, categoryId: categories[0]?.id || '' });
            const saveProduct = async (prod) => {
                if (!prod.name.trim() || !prod.categoryId) { toast('الاسم والفئة مطلوبان', 'error'); return; }
                const catId = prod.categoryId;
                let prods = [...(products[catId] || [])];
                if (editingProduct && editingProduct._origCat && editingProduct._origCat !== catId) {
                    const oldProds = (products[editingProduct._origCat] || []).filter(p => p.id !== prod.id);
                    await db.ref('products/' + editingProduct._origCat).set(oldProds);
                }
                const idx = prods.findIndex(p => p.id === prod.id);
                if (idx >= 0) prods[idx] = prod;
                else prods.push(prod);
                if (await saveToFirebase('products/' + catId, prods)) {
                    setEditingProduct(null);
                }
            };
            const deleteProduct = async (prod) => {
                if (!confirm('حذف المنتج؟')) return;
                const prods = (products[prod.categoryId] || []).filter(p => p.id !== prod.id);
                if (await saveToFirebase('products/' + prod.categoryId, prods)) {}
            };
            const handleImageUpload = async (e, prod, setProd) => {
                const files = Array.from(e.target.files || []);
                if (!files.length) return;
                const current = prod.images || [];
                if (current.length + files.length > 4) { toast('حد أقصى 4 صور', 'error'); return; }
                toast('جاري ضغط الصور...', 'info');
                try {
                    const compressed = await Promise.all(files.map(f => compressImage(f)));
                    setProd({ ...prod, images: [...current, ...compressed] });
                    toast('تم رفع الصور', 'success');
                } catch (err) {
                    toast('فشل رفع الصور: ' + (err.message || ''), 'error');
                }
            };

            // Orders
            const updateOrderStatus = async (orderId, status) => {
                const updated = orders.map(o => o.id === orderId ? { ...o, status } : o);
                await saveToFirebase('orders', updated);
            };

            // Settings
            const saveSettings = async () => { await saveToFirebase('settings', settings); };
            const changePin = async () => {
                if (newPin.length < 6) { toast('الرمز 6 أحرف على الأقل', 'error'); return; }
                if (newPin !== confirmPin) { toast('الرمزان غير متطابقين', 'error'); return; }
                const updated = { ...settings, pin: newPin };
                if (await saveToFirebase('settings', updated)) { setNewPin('');
                    setConfirmPin('');
                    toast('تم تغيير الرمز', 'success'); }
            };
            const saveHero = async () => { await saveToFirebase('hero', hero); };
            const handleLogoUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                try {
                    const data = await compressImage(file, 400, 0.8);
                    const updated = { ...settings, logo: data };
                    if (await saveToFirebase('settings', updated)) setSettings(updated);
                } catch (err) {
                    toast('فشل رفع الشعار: ' + (err.message || ''), 'error');
                }
            };

            const filteredOrders = filterStatus === 'all' ? orders : orders.filter(o => o.status === filterStatus);
            const allProductsList = useMemo(() => {
                let list = [];
                Object.entries(products).forEach(([catId, prods]) => {
                    if (Array.isArray(prods)) prods.forEach(p => list.push({ ...p, categoryId: catId }));
                });
                if (selectedCat) list = list.filter(p => p.categoryId === selectedCat);
                return list;
            }, [products, selectedCat]);

            // --- PIN Login ---
            if (!authed) {
                return ( <Modal open={open} onClose={onClose} title="لوحة الإدارة">
                    <div className="p-8 text-center">
                        <div className="w-16 h-16 rounded-full bg-ink-card border border-primary/30 flex items-center justify-center mx-auto mb-4"><Icon name="lock" size={28} className="text-primary" /></div>
                        <h3 className="font-cairo font-bold text-lg mb-1">أدخل الرمز السري</h3>
                        <p className="text-gray-500 text-sm mb-6">للوصول إلى لوحة التحكم</p>
                        <input type="password" inputMode="text" value={pinInput} onChange={e => setPinInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} placeholder="••••••" className="text-center text-2xl font-mono tracking-[0.5em] max-w-[200px] mx-auto mb-4" autoFocus />
                        <button onClick={handleLogin} className="btn-primary rounded-xl px-10 py-3 w-full max-w-[200px]">دخول</button>
                    </div>
                </Modal>
                );
            }

            // --- Product Editor ---
            if (editingProduct) {
                const prod = editingProduct;
                const setProd = setEditingProduct;
                return ( <Modal open={open} onClose={() => setEditingProduct(null)} title={prod._isNew ? 'إضافة منتج' : 'تعديل منتج'} wide>
                    <div className="space-y-4">
                        <input value={prod.name} onChange={e => setProd({ ...prod, name: e.target.value })} placeholder="اسم المنتج *" />
                        <div className="grid grid-cols-2 gap-3">
                            <input type="number" value={prod.price} onChange={e => setProd({ ...prod, price: Number(e.target.value) || 0 })} placeholder="السعر (دج) *" className="font-mono" dir="ltr" />
                            <input type="number" value={prod.stock} onChange={e => setProd({ ...prod, stock: Number(e.target.value) || 0 })} placeholder="المخزون" className="font-mono" dir="ltr" />
                        </div>
                        <select value={prod.categoryId} onChange={e => setProd({ ...prod, categoryId: e.target.value })}>
                            {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                        <textarea rows={3} value={prod.description || ''} onChange={e => setProd({ ...prod, description: e.target.value })} placeholder="الوصف" />
                        <label className="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" checked={!!prod.bestSeller} onChange={e => setProd({ ...prod, bestSeller: e.target.checked })} className="!w-auto" />
                            وسم كـ "الأكثر مبيعاً"
                        </label>
                        <div>
                            <label className="text-sm text-gray-300 block mb-2">الصور (حتى 4) — انقر لاختيار الرئيسية</label>
                            <div className="flex flex-wrap gap-2">
                                {(prod.images || []).map((img, i) => (
                                    <div key={i} className={`relative w-20 h-20 rounded-lg overflow-hidden border-2 cursor-pointer ${prod.mainImage === i ? 'border-primary' : 'border-ink-border'}`} onClick={() => setProd({ ...prod, mainImage: i })}>
                                        <img src={img} alt="" className="w-full h-full object-cover" />
                                        <button onClick={(e) => { e.stopPropagation(); const imgs = prod.images.filter((_, j) => j !== i);
                                            setProd({ ...prod, images: imgs, mainImage: Math.min(prod.mainImage, Math.max(0, imgs.length - 1)) }); }} className="absolute top-0 left-0 bg-red-500 text-white w-5 h-5 flex items-center justify-center text-xs rounded-br">×</button>
                                        {prod.mainImage === i && <span className="absolute bottom-0 inset-x-0 bg-primary text-white text-[9px] text-center font-bold">رئيسية</span>}
                                    </div>
                                ))}
                                {(prod.images || []).length < 4 && (
                                    <label className="w-20 h-20 rounded-lg border-2 border-dashed border-ink-border flex items-center justify-center cursor-pointer hover:border-primary">
                                        <Icon name="upload" size={20} className="text-gray-500" />
                                        <input type="file" accept="image/*" multiple className="hidden" onChange={e => handleImageUpload(e, prod, setProd)} />
                                    </label>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-3 pt-2">
                            <button onClick={() => saveProduct(prod)} disabled={saving} className="flex-1 btn-primary rounded-xl py-3 text-sm">{saving ? 'جاري الحفظ...' : 'حفظ المنتج'}</button>
                            <button onClick={() => setEditingProduct(null)} className="btn-outline-primary rounded-xl px-6 py-3 text-sm">إلغاء</button>
                        </div>
                    </div>
                </Modal>
                );
            }

            // --- Main Admin Tabs ---
            const tabs = [
                { id: 'products', label: 'المنتجات', icon: 'package' },
                { id: 'categories', label: 'الفئات', icon: 'tag' },
                { id: 'orders', label: 'الطلبات', icon: 'clipboard' },
                { id: 'hero', label: 'الصفحة الرئيسية', icon: 'home' },
                { id: 'settings', label: 'الإعدادات', icon: 'settings' },
            ];
            return ( <Modal open={open} onClose={onClose} title="لوحة الإدارة — Vellure" wide>
                <div className="flex gap-1 px-4 pt-3 pb-2 overflow-x-auto border-b border-ink-border shrink-0">
                    {tabs.map(t => <button key={t.id} onClick={() => setTab(t.id)} className={`admin-tab flex items-center gap-1.5 ${tab === t.id ? 'active' : 'text-gray-400'}`}><Icon name={t.icon} size={16} /> {t.label}</button>)}
                </div>
                <div className="p-5">
                    {tab === 'products' && (
                        <div>
                            <div className="flex flex-wrap gap-2 mb-4 items-center">
                                <button onClick={() => setEditingProduct({ ...emptyProduct(), _isNew: true, _origCat: null })} className="btn-primary rounded-lg px-4 py-2 text-sm flex items-center gap-1"><Icon name="plus" size={16} /> إضافة منتج</button>
                                <select value={selectedCat} onChange={e => setSelectedCat(e.target.value)} className="!w-auto text-sm"><option value="">كل الفئات</option>{categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                <span className="text-xs text-gray-500 mr-auto font-mono">{allProductsList.length} منتج</span>
                            </div>
                            <div className="space-y-2 max-h-[60vh] overflow-y-auto">
                                {allProductsList.map(p => (
                                    <div key={p.id} className="flex items-center gap-3 p-3 rounded-xl bg-ink-card border border-ink-border">
                                        <div className="w-12 h-12 rounded-lg overflow-hidden bg-ink-soft shrink-0"><img src={(p.images && p.images[p.mainImage || 0]) || PLACEHOLDER_IMG} alt="" className="w-full h-full object-cover" /></div>
                                        <div className="flex-1 min-w-0"><h4 className="font-cairo font-semibold text-sm truncate">{p.name}</h4><div className="flex gap-3 text-xs text-gray-400"><span className="font-mono text-primary">{formatPrice(p.price)} دج</span><span>مخزون: {p.stock}</span>{p.bestSeller && <span className="text-yellow-400">★</span>}</div></div>
                                        <button onClick={() => setEditingProduct({ ...p, _isNew: false, _origCat: p.categoryId })} className="p-2 rounded-lg hover:bg-ink-border"><Icon name="edit" size={16} /></button>
                                        <button onClick={() => deleteProduct(p)} className="p-2 rounded-lg hover:bg-red-900/30 text-red-400"><Icon name="trash" size={16} /></button>
                                    </div>
                                ))}
                                {allProductsList.length === 0 && <p className="text-center text-gray-500 py-8">لا توجد منتجات</p>}
                            </div>
                        </div>
                    )}
                    {tab === 'categories' && (
                        <div>
                            <div className="flex gap-2 mb-4">
                                <input value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="اسم الفئة الجديدة" className="flex-1" />
                                <button onClick={addCategory} className="btn-primary rounded-lg px-4 py-2 text-sm shrink-0 flex items-center gap-1"><Icon name="plus" size={16} /> إضافة</button>
                            </div>
                            <div className="space-y-2">
                                {categories.map(c => (
                                    <div key={c.id} className="flex items-center gap-3 p-3 rounded-xl bg-ink-card border border-ink-border">
                                        {editingCat === c.id ? (
                                            <input autoFocus defaultValue={c.name} onKeyDown={e => { if (e.key === 'Enter') renameCategory(c.id, e.currentTarget.value); if (e.key === 'Escape') setEditingCat(null); }} onBlur={e => renameCategory(c.id, e.currentTarget.value)} className="flex-1" />
                                        ) : (
                                            <div className="flex-1"><span className="font-cairo font-semibold">{c.name}</span><span className="text-xs text-gray-500 mr-2 font-mono">({(products[c.id] || []).length} منتج)</span></div>
                                        )}
                                        <button onClick={() => setEditingCat(c.id)} className="p-2 rounded-lg hover:bg-ink-border"><Icon name="edit" size={16} /></button>
                                        <button onClick={() => deleteCategory(c.id)} className="p-2 rounded-lg hover:bg-red-900/30 text-red-400"><Icon name="trash" size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {tab === 'orders' && (
                        <div>
                            <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
                                <button onClick={() => setFilterStatus('all')} className={`admin-tab text-xs ${filterStatus === 'all' ? 'active' : 'text-gray-400'}`}>الكل ({orders.length})</button>
                                {ORDER_STATUSES.map(s => <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`admin-tab text-xs ${filterStatus === s.id ? 'active' : 'text-gray-400'}`}>{s.label} ({orders.filter(o => o.status === s.id).length})</button>)}
                            </div>
                            <div className="space-y-3 max-h-[60vh] overflow-y-auto">
                                {filteredOrders.map(o => {
                                    const st = ORDER_STATUSES.find(s => s.id === o.status) || ORDER_STATUSES[0];
                                    return ( <div key={o.id} className="p-4 rounded-xl bg-ink-card border border-ink-border">
                                        <div className="flex flex-wrap items-start justify-between gap-2 mb-2">
                                            <div><span className="track-code font-mono text-primary text-sm font-bold">{o.trackingId}</span><span className={`status-badge ${st.cls} mr-2`}>{st.label}</span></div>
                                            <span className="text-xs text-gray-500 font-mono">{new Date(o.createdAt).toLocaleDateString('ar-DZ')}</span>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-1 text-sm mb-2">
                                            <div><span className="text-gray-500">الزبون:</span> {o.customer.name}</div>
                                            <div><span className="text-gray-500">الهاتف:</span> <a href={`tel:${o.customer.phone}`} className="text-primary font-mono" dir="ltr">{o.customer.phone}</a></div>
                                            <div><span className="text-gray-500">العنوان:</span> {o.delivery.commune}، {o.delivery.wilaya}</div>
                                            <div><span className="text-gray-500">التوصيل:</span> {o.delivery.company}</div>
                                            <div><span className="text-gray-500">الدفع:</span> {o.payment === 'cod' ? 'عند الاستلام' : 'CCP'}</div>
                                            <div><span className="text-gray-500">المجموع:</span> <span className="font-mono text-primary font-bold">{formatPrice(o.total)} دج</span></div>
                                        </div>
                                        <div className="text-xs text-gray-400 mb-2">المنتجات: {o.items.map(i => `${i.name} ×${i.qty}`).join(' | ')}</div>
                                        <select value={o.status} onChange={e => updateOrderStatus(o.id, e.target.value)} className="text-sm !w-auto">{ORDER_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select>
                                    </div>
                                    );
                                })}
                                {filteredOrders.length === 0 && <p className="text-center text-gray-500 py-8">لا توجد طلبات</p>}
                            </div>
                        </div>
                    )}
                    {tab === 'hero' && (
                        <div className="space-y-4">
                            <input value={hero.title} onChange={e => setHero({ ...hero, title: e.target.value })} placeholder="العنوان الرئيسي" />
                            <input value={hero.subtitle} onChange={e => setHero({ ...hero, subtitle: e.target.value })} placeholder="النص الفرعي" />
                            <textarea rows={3} value={hero.description} onChange={e => setHero({ ...hero, description: e.target.value })} placeholder="الوصف التعريفي" />
                            <input value={hero.videoUrl || ''} onChange={e => setHero({ ...hero, videoUrl: e.target.value })} placeholder="رابط فيديو (يوتيوب)" dir="ltr" className="text-left" />
                            <input value={(hero.phones || []).join(', ')} onChange={e => setHero({ ...hero, phones: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })} placeholder="أرقام الهواتف (مفصولة بفاصلة)" dir="ltr" className="text-left" />
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <input value={hero.social?.facebook || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, facebook: e.target.value } })} placeholder="فيسبوك" dir="ltr" className="text-left" />
                                <input value={hero.social?.instagram || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, instagram: e.target.value } })} placeholder="إنستغرام" dir="ltr" className="text-left" />
                                <input value={hero.social?.whatsapp || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, whatsapp: e.target.value } })} placeholder="واتساب (رقم دولي)" dir="ltr" className="text-left" />
                                <input value={hero.social?.tiktok || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, tiktok: e.target.value } })} placeholder="تيك توك" dir="ltr" className="text-left" />
                            </div>
                            <button onClick={saveHero} disabled={saving} className="btn-primary rounded-xl px-8 py-3 text-sm flex items-center gap-2"><Icon name="save" size={16} /> {saving ? 'جاري الحفظ...' : 'حفظ الصفحة الرئيسية'}</button>
                        </div>
                    )}
                    {tab === 'settings' && (
                        <div className="space-y-6">
                            <div>
                                <h4 className="font-cairo font-bold text-primary mb-3">شعار المتجر</h4>
                                <div className="flex items-center gap-4">
                                    {settings.logo ? <img src={settings.logo} alt="Logo" className="w-20 h-20 rounded-xl object-contain bg-ink-card border border-ink-border" /> : <div className="w-20 h-20 rounded-xl bg-ink-card border border-dashed border-ink-border flex items-center justify-center text-gray-600 text-xs">لا يوجد</div>}
                                    <div><label className="btn-outline-primary rounded-lg px-4 py-2 text-sm cursor-pointer inline-flex items-center gap-1"><Icon name="upload" size={14} /> رفع شعار <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} /></label>
                                        {settings.logo && <button onClick={async () => { const u = { ...settings, logo: '' }; if (await saveToFirebase('settings',
                                                    u)) setSettings(u); }} className="block text-red-400 text-xs mt-2">حذف الشعار</button>}</div>
                                </div>
                            </div>
                            <div>
                                <h4 className="font-cairo font-bold text-primary mb-3">حساب CCP</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <input value={settings.ccpAccount || ''} onChange={e => setSettings({ ...settings, ccpAccount: e.target.value })} placeholder="رقم الحساب" dir="ltr" className="text-left font-mono" />
                                    <input value={settings.ccpName || ''} onChange={e => setSettings({ ...settings, ccpName: e.target.value })} placeholder="اسم صاحب الحساب" />
                                </div>
                            </div>
                            <div>
                                <h4 className="font-cairo font-bold text-primary mb-3">رقم واتساب المتجر</h4>
                                <input value={settings.whatsappNumber || ''} onChange={e => setSettings({ ...settings, whatsappNumber: e.target.value })} placeholder="213555123456" dir="ltr" className="text-left font-mono" />
                            </div>
                            <div>
                                <h4 className="font-cairo font-bold text-primary mb-3">أكواد الخصم</h4>
                                {(settings.discountCodes || []).map((dc, i) => (
                                    <div key={i} className="flex items-center gap-2 mb-2">
                                        <input value={dc.code} onChange={e => { const codes = [...settings.discountCodes];
                                            codes[i] = { ...codes[i], code: e.target.value.toUpperCase() };
                                            setSettings({ ...settings, discountCodes: codes }); }} className="flex-1 font-mono" placeholder="CODE" dir="ltr" />
                                        <input type="number" value={dc.percent} onChange={e => { const codes = [...settings.discountCodes];
                                            codes[i] = { ...codes[i], percent: Number(e.target.value) || 0 };
                                            setSettings({ ...settings, discountCodes: codes }); }} className="!w-20 font-mono" dir="ltr" />
                                        <span className="text-sm text-gray-400">%</span>
                                        <button onClick={() => { const codes = settings.discountCodes.filter((_, j) => j !== i);
                                            setSettings({ ...settings, discountCodes: codes }); }} className="p-2 text-red-400"><Icon name="trash" size={16} /></button>
                                    </div>
                                ))}
                                <button onClick={() => setSettings({ ...settings, discountCodes: [...(settings.discountCodes || []), { code: '',
                                            percent: 10 }] })} className="btn-outline-primary rounded-lg px-4 py-2 text-sm flex items-center gap-1"><Icon name="plus" size={14} /> إضافة كود</button>
                            </div>
                            <button onClick={saveSettings} disabled={saving} className="btn-primary rounded-xl px-8 py-3 text-sm flex items-center gap-2"><Icon name="save" size={16} /> {saving ? 'جاري الحفظ...' : 'حفظ الإعدادات'}</button>
                            <div className="border-t border-ink-border pt-6">
                                <h4 className="font-cairo font-bold text-primary mb-3">تغيير الرمز السري</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                                    <input type="password" value={newPin} onChange={e => setNewPin(e.target.value)} placeholder="الرمز الجديد (6+ أحرف)" className="font-mono" dir="ltr" />
                                    <input type="password" value={confirmPin} onChange={e => setConfirmPin(e.target.value)} placeholder="تأكيد الرمز" className="font-mono" dir="ltr" />
                                </div>
                                <button onClick={changePin} className="btn-outline-primary rounded-xl px-6 py-2.5 text-sm flex items-center gap-1"><Icon name="shield" size={16} /> تغيير الرمز</button>
                            </div>
                        </div>
                    )}
                </div>
            </Modal>
            );
        }

        // ============================================================
        //  MAIN APP (Vellure with Order Now button & visible sidebar toggle)
        // ============================================================
        function App() {
            const [ready, setReady] = useState(false);
            const [categories, setCategories] = useState([]);
            const [allProducts, setAllProducts] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [hero, setHero] = useState(DEFAULT_HERO);
            const [activeCat, setActiveCat] = useState('all');
            const [search, setSearch] = useState('');
            const [sort, setSort] = useState('default');
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [showCart, setShowCart] = useState(false);
            const [showCheckout, setShowCheckout] = useState(false);
            const [showAdmin, setShowAdmin] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [showSearch, setShowSearch] = useState(false);
            const toast = useToast();

            // تهيئة البيانات من Firebase مع معالجة الأخطاء
            useEffect(() => {
                if (!db) {
                    console.error('❌ لم يتم الاتصال بـ Firebase. تأكد من صحة إعدادات config.');
                    // يمكنك عرض رسالة خطأ للمستخدم هنا
                    return;
                }
                const initDb = async () => {
                    try {
                        console.log('🔄 بدء تهيئة قاعدة البيانات...');
                        const catsSnap = await db.ref('categories').once('value');
                        if (!catsSnap.val()) {
                            console.log('📦 لا توجد بيانات افتراضية، جاري إنشاؤها...');
                            await db.ref('categories').set(DEFAULT_CATEGORIES);
                            for (const cat of DEFAULT_CATEGORIES) {
                                await db.ref('products/' + cat.id).set(DEFAULT_PRODUCTS[cat.id] || []);
                            }
                            await db.ref('settings').set(DEFAULT_SETTINGS);
                            await db.ref('hero').set(DEFAULT_HERO);
                            await db.ref('orders').set([]);
                            console.log('✅ تم إنشاء البيانات الافتراضية بنجاح');
                        } else {
                            console.log('✅ البيانات موجودة بالفعل، جارٍ تحميلها...');
                        }
                        setReady(true);
                        console.log('🎉 تم تحميل الموقع بنجاح');
                    } catch (error) {
                        console.error('❌ خطأ في تهيئة قاعدة البيانات:', error);
                        // في حال حدوث خطأ، نضبط ready إلى false لتظهر رسالة خطأ للمستخدم
                        setReady(false);
                    }
                };
                initDb();
            }, []);

            // استماع للتغييرات الفورية في قاعدة البيانات
            useEffect(() => {
                if (!db || !ready) return;
                const refs = ['categories', 'settings', 'hero', 'products'].map(path => db.ref(path));
                const handlers = [
                    s => setCategories(s.val() || DEFAULT_CATEGORIES),
                    s => setSettings(s.val() || DEFAULT_SETTINGS),
                    s => setHero(s.val() || DEFAULT_HERO),
                    s => {
                        const data = s.val() || {};
                        let all = [];
                        Object.values(data).forEach(arr => { if (Array.isArray(arr)) all = all.concat(arr); });
                        setAllProducts(all);
                    }
                ];
                refs.forEach((ref, i) => ref.on('value', handlers[i]));
                return () => refs.forEach((ref, i) => ref.off('value', handlers[i]));
            }, [ready]);

            useEffect(() => {
                if (ready && typeof AOS !== 'undefined') {
                    AOS.init({ duration: 800, easing: 'ease-out', once: false, mirror: true });
                }
            }, [ready]);

            const filtered = useMemo(() => {
                let list = allProducts;
                if (activeCat !== 'all') list = list.filter(p => p.categoryId === activeCat);
                if (search.trim()) {
                    const q = search.trim().toLowerCase();
                    list = list.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
                }
                switch (sort) {
                    case 'price-asc':
                        list.sort((a, b) => (a.price || 0) - (b.price || 0));
                        break;
                    case 'price-desc':
                        list.sort((a, b) => (b.price || 0) - (a.price || 0));
                        break;
                    case 'newest':
                        list.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                        break;
                    default:
                        break;
                }
                return list;
            }, [allProducts, activeCat, search, sort]);

            const bestSellers = useMemo(() => allProducts.filter(p => p.bestSeller), [allProducts]);

            const addToCart = (product) => {
                if ((product.stock ?? 0) <= 0) { toast('المنتج غير متوفر', 'error'); return; }
                setCart(prev => {
                    const existing = prev.find(i => i.id === product.id);
                    if (existing) {
                        if (existing.qty >= product.stock) { toast('وصلت للحد الأقصى', 'error'); return prev; }
                        return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
                    }
                    return [...prev, { ...product, qty: 1 }];
                });
                toast('تمت الإضافة إلى السلة', 'success');
            };

            const cartCount = cart.reduce((s, i) => s + i.qty, 0);
            const waNumber = settings.whatsappNumber || hero.social?.whatsapp || '213555123456';

            const getVideoEmbed = (url) => {
                if (!url) return null;
                if (url.includes('youtube.com/embed')) return url;
                const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/))([a-zA-Z0-9_-]{11})/);
                return ytMatch ? `https://www.youtube.com/embed/${ytMatch[1]}` : url;
            };

            const handleOrderNow = () => {
                const productsSection = document.getElementById('products-section');
                if (productsSection) {
                    productsSection.scrollIntoView({ behavior: 'smooth' });
                    setTimeout(() => {
                        if (allProducts.length > 0) {
                            setSelectedProduct(allProducts[0]);
                        }
                    }, 600);
                }
            };

            if (!ready) {
                // عرض رسالة خطأ إذا فشل التحميل، أو شاشة تحميل عادية
                return (
                    <div className="min-h-screen flex items-center justify-center bg-ink">
                        <div className="text-center">
                            <div className="w-16 h-16 rounded-full bg-primary flex items-center justify-center mx-auto mb-4">
                                <span className="font-cairo font-extrabold text-white text-xl">V</span>
                            </div>
                            <p className="text-primary font-cairo font-bold">Vellure</p>
                            <p className="text-gray-500 text-sm mt-1">جاري تحميل البيانات...</p>
                            {/* في حال وجود خطأ، يمكن إزالة التعليق عن السطر التالي لعرض رسالة خطأ */}
                            {/* <p className="text-red-400 text-sm mt-2">تعذر الاتصال بقاعدة البيانات. يرجى التحقق من وحدة التحكم (F12).</p> */}
                        </div>
                    </div>
                );
            }

            return ( <div className="min-h-screen bg-ink pb-safe">
                    {/* ===== SIDEBAR OVERLAY ===== */}
                    <div className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />

                    {/* ===== SIDEBAR ===== */}
                    <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="p-4 border-b border-ink-border flex items-center justify-between">
                            <span className="font-cairo font-bold text-lg gradient-text">Vellure</span>
                            <button onClick={() => setSidebarOpen(false)} className="p-2 hover:bg-ink-border rounded-lg"><Icon name="x" size={20} className="text-gray-400 hover:text-white" /></button>
                        </div>
                        <div className="p-4 space-y-2">
                            <button onClick={() => { setActiveCat('all');
                                setSidebarOpen(false); }} className={`block w-full text-right px-3 py-2 rounded-lg text-sm sidebar-item ${activeCat === 'all' ? 'active' : ''}`}>
                                الكل
                            </button>
                            {categories.map(c => (
                                <button key={c.id} onClick={() => { setActiveCat(c.id);
                                    setSidebarOpen(false); }} className={`block w-full text-right px-3 py-2 rounded-lg text-sm sidebar-item ${activeCat === c.id ? 'active' : ''}`}>
                                    {c.name}
                                </button>
                            ))}
                            <div className="border-t border-ink-border my-4"></div>
                            <button onClick={() => { setShowAdmin(true);
                                setSidebarOpen(false); }} className="block w-full text-right px-3 py-2 rounded-lg text-sm sidebar-item flex items-center gap-2">
                                <Icon name="settings" size={18} /> لوحة الإدارة
                            </button>
                        </div>
                    </div>

                    {/* ===== HEADER ===== */}
                    <header className="sticky top-0 z-50 bg-ink/95 backdrop-blur-md border-b border-ink-border pt-safe">
                        <div className="max-w-8xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
                            <div className="flex items-center gap-2">
                                <button onClick={() => setSidebarOpen(true)} className="p-2 rounded-lg hover:bg-ink-card">
                                    <Icon name="menu" size={22} className="header-icon" />
                                </button>
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveCat('all');
                                    window.scrollTo(0, 0); }}>
                                    {settings.logo ? <img src={settings.logo} alt="Vellure" className="h-9 w-9 rounded-lg object-contain" /> :
                                        <div className="w-9 h-9 rounded-lg bg-primary flex items-center justify-center"><span className="font-cairo font-extrabold text-white text-sm">V</span></div>}
                                    <span className="font-cairo font-extrabold text-lg gradient-text hidden sm:block">Vellure</span>
                                </div>
                            </div>
                            <div className="hidden md:flex flex-1 max-w-md mx-4 relative">
                                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ابحث عن منتج..." className="!pr-10" />
                                <Icon name="search" size={18} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400" />
                            </div>
                            <div className="flex items-center gap-1">
                                <button onClick={() => setShowSearch(!showSearch)} className="p-2 rounded-lg hover:bg-ink-card md:hidden">
                                    <Icon name="search" size={20} className="header-icon" />
                                </button>
                                <button onClick={() => setShowCart(true)} className="p-2 rounded-lg hover:bg-ink-card relative">
                                    <Icon name="shoppingCart" size={20} className="header-icon" />
                                    {cartCount > 0 && <span className="cart-badge" style={{ position: 'absolute', top: '-6px', left: '-6px', background: '#FF6B35', color: '#fff', fontSize: '11px', fontWeight: 700, width: '20px', height: '20px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'monospace' }}>{cartCount}</span>}
                                </button>
                            </div>
                        </div>
                        {showSearch && (
                            <div className="px-4 pb-3 md:hidden">
                                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ابحث عن منتج..." autoFocus />
                            </div>
                        )}
                    </header>

                    {/* ===== LANDING HERO ===== */}
                    {activeCat === 'all' && !search && (
                        <section className="hero-bg relative overflow-hidden" data-aos="fade-up">
                            <div className="particle" style={{ width: '10px', height: '10px', top: '10%', left: '10%', animationDelay: '0s' }}></div>
                            <div className="particle" style={{ width: '15px', height: '15px', top: '20%', right: '15%', animationDelay: '2s' }}></div>
                            <div className="particle" style={{ width: '8px', height: '8px', top: '60%', left: '5%', animationDelay: '4s' }}></div>
                            <div className="particle" style={{ width: '12px', height: '12px', top: '70%', right: '10%', animationDelay: '1s' }}></div>

                            <div className="max-w-8xl mx-auto px-4 py-16 md:py-28 text-center relative z-10">
                                <div className="mb-8 flex justify-center">
                                    {settings.logo ? (
                                        <img src={settings.logo} alt="Vellure" className="h-28 md:h-40 w-auto object-contain drop-shadow-2xl" data-aos="zoom-in" />
                                    ) : (
                                        <div className="w-28 h-28 md:w-40 md:h-40 rounded-2xl gradient-bg flex items-center justify-center shadow-2xl shadow-primary/20" data-aos="zoom-in">
                                            <span className="font-cairo font-extrabold text-white text-5xl md:text-6xl">V</span>
                                        </div>
                                    )}
                                </div>
                                <h1 className="font-cairo text-4xl md:text-6xl font-extrabold mb-4" data-aos="fade-up" data-aos-delay="100">
                                    <span className="gradient-text">{hero.title || 'Vellure'}</span>
                                </h1>
                                <p className="text-gray-300 text-lg md:text-xl max-w-2xl mx-auto mb-3 leading-relaxed" data-aos="fade-up" data-aos-delay="200">{hero.subtitle}</p>
                                <p className="text-gray-400 text-sm md:text-base max-w-xl mx-auto mb-8 leading-relaxed" data-aos="fade-up" data-aos-delay="300">{hero.description}</p>

                                {hero.videoUrl && getVideoEmbed(hero.videoUrl) && (
                                    <div className="max-w-2xl mx-auto mb-6 rounded-2xl overflow-hidden border border-ink-border aspect-video relative" data-aos="zoom-in" data-aos-delay="400">
                                        <iframe src={getVideoEmbed(hero.videoUrl)} className="w-full h-full" allowFullScreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" title="فيديو تعريفي" />
                                    </div>
                                )}

                                <div data-aos="fade-up" data-aos-delay="450" className="mb-8">
                                    <button onClick={handleOrderNow} className="btn-gold rounded-full px-10 py-4 text-lg font-bold shadow-2xl shadow-gold/40 hover:scale-105 transition-all btn-order-now flex items-center gap-3 mx-auto">
                                        <Icon name="shoppingBag" size={24} className="order-icon" />
                                        اطلب الآن
                                        <Icon name="arrowLeft" size={20} className="order-icon" />
                                    </button>
                                    <p className="text-xs text-gray-500 mt-2">✨ اضغط لاستعراض المنتجات واطلب ما يناسبك</p>
                                </div>

                                <div className="flex flex-wrap items-center justify-center gap-4 mb-8" data-aos="fade-up" data-aos-delay="500">
                                    {hero.social?.facebook && (
                                        <a href={hero.social.facebook} target="_blank" rel="noopener noreferrer" className="social-icon-wrapper">
                                            <FacebookIcon className="social-icon social-icon-fb" />
                                        </a>
                                    )}
                                    {hero.social?.instagram && (
                                        <a href={hero.social.instagram} target="_blank" rel="noopener noreferrer" className="social-icon-wrapper">
                                            <InstagramIcon className="social-icon social-icon-ig" />
                                        </a>
                                    )}
                                    {hero.social?.whatsapp && (
                                        <a href={`https://wa.me/${hero.social.whatsapp}`} target="_blank" rel="noopener noreferrer" className="social-icon-wrapper">
                                            <WhatsAppIcon className="social-icon social-icon-wa" />
                                        </a>
                                    )}
                                    {hero.social?.tiktok && (
                                        <a href={hero.social.tiktok} target="_blank" rel="noopener noreferrer" className="social-icon-wrapper">
                                            <TikTokIcon className="social-icon social-icon-tt" />
                                        </a>
                                    )}
                                </div>

                                {(hero.phones || []).length > 0 && (
                                    <div className="flex flex-wrap items-center justify-center gap-3" data-aos="fade-up" data-aos-delay="600">
                                        {hero.phones.map((ph, i) => (
                                            <a key={i} href={`tel:${ph}`} className="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-ink-card border border-ink-border text-sm hover:border-primary transition-all hover:scale-105">
                                                <Icon name="phone" size={16} className="text-primary" />
                                                <span className="font-mono" dir="ltr">{ph}</span>
                                            </a>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </section>
                    )}

                    {/* ===== CATEGORIES BAR ===== */}
                    <div className="sticky top-14 z-40 bg-ink/90 backdrop-blur-md border-b border-ink-border">
                        <div className="max-w-8xl mx-auto px-4 py-2.5 flex gap-2 overflow-x-auto">
                            <button onClick={() => setActiveCat('all')} className={`shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${activeCat === 'all' ? 'bg-primary text-white' : 'bg-ink-card text-gray-400 border border-ink-border hover:border-primary/50'}`}>الكل</button>
                            {categories.map(c => (
                                <button key={c.id} onClick={() => setActiveCat(c.id)} className={`shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${activeCat === c.id ? 'bg-primary text-white' : 'bg-ink-card text-gray-400 border border-ink-border hover:border-primary/50'}`}>{c.name}</button>
                            ))}
                        </div>
                    </div>

                    {/* ===== PRODUCTS ===== */}
                    <main id="products-section" className="max-w-8xl mx-auto px-4 py-6">
                        {activeCat === 'all' && !search && bestSellers.length > 0 && (
                            <section className="mb-10" data-aos="fade-up">
                                <div className="flex items-center gap-2 mb-4">
                                    <Icon name="star" size={22} className="text-yellow-400" />
                                    <h2 className="font-cairo text-2xl font-bold gradient-text">الأكثر مبيعاً</h2>
                                </div>
                                <div className="product-grid">
                                    {bestSellers.map(p => <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} onAddCart={addToCart} whatsappNumber={waNumber} />)}
                                </div>
                            </section>
                        )}

                        <section data-aos="fade-up">
                            <div className="flex flex-wrap items-center justify-between gap-2 mb-4">
                                <h2 className="font-cairo text-xl font-bold">
                                    {search ? `نتائج البحث (${filtered.length})` : activeCat === 'all' ? 'جميع المنتجات' : categories.find(c => c.id === activeCat)?.name || 'المنتجات'}
                                </h2>
                                <div className="flex items-center gap-2">
                                    <select value={sort} onChange={e => setSort(e.target.value)} className="!w-auto text-sm bg-ink-card border-ink-border rounded-lg px-3 py-1.5">
                                        <option value="default">ترتيب</option>
                                        <option value="price-asc">السعر: من الأقل</option>
                                        <option value="price-desc">السعر: من الأعلى</option>
                                        <option value="newest">الأحدث</option>
                                    </select>
                                    <span className="text-xs text-gray-500 font-mono">{filtered.length} منتج</span>
                                </div>
                            </div>
                            {filtered.length === 0 ? (
                                <div className="text-center py-16 text-gray-500"><Icon name="package" size={48} className="mx-auto mb-3 opacity-30" /><p>لا توجد منتجات{search ? ' مطابقة لبحثك' : ''}</p></div>
                            ) : (
                                <div className="product-grid">
                                    {filtered.map(p => <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} onAddCart={addToCart} whatsappNumber={waNumber} />)}
                                </div>
                            )}
                        </section>
                    </main>

                    {/* ===== FOOTER ===== */}
                    <footer className="border-t border-ink-border mt-12 pb-safe">
                        <div className="max-w-8xl mx-auto px-4 py-8 text-center">
                            <div className="flex items-center justify-center gap-2 mb-3">
                                {settings.logo ? <img src={settings.logo} alt="" className="h-8 w-8 rounded object-contain" /> :
                                    <div className="w-8 h-8 rounded bg-primary flex items-center justify-center"><span className="font-cairo font-extrabold text-white text-xs">V</span></div>}
                                <span className="font-cairo font-bold gradient-text">Vellure</span>
                            </div>
                            <p className="text-gray-500 text-sm mb-4">متجر كل ما تحب — إلكترونيات • موضة • منزل • جمال</p>
                            <div className="flex items-center justify-center gap-3 mb-4">
                                {hero.social?.facebook && <a href={hero.social.facebook} target="_blank" rel="noopener noreferrer" className="social-facebook"><FacebookIcon size={18} /></a>}
                                {hero.social?.instagram && <a href={hero.social.instagram} target="_blank" rel="noopener noreferrer" className="social-instagram"><InstagramIcon size={18} /></a>}
                                {hero.social?.whatsapp && <a href={`https://wa.me/${hero.social.whatsapp}`} target="_blank" rel="noopener noreferrer" className="social-whatsapp"><WhatsAppIcon size={18} /></a>}
                                {hero.social?.tiktok && <a href={hero.social.tiktok} target="_blank" rel="noopener noreferrer" className="social-tiktok"><TikTokIcon size={16} /></a>}
                            </div>
                            <p className="text-gray-600 text-xs">© {new Date().getFullYear()} Vellure — جميع الحقوق محفوظة</p>
                            <p className="text-gray-700 text-[10px] mt-1">صُنع في الجزائر 🇩🇿</p>
                        </div>
                    </footer>

                    {/* ===== FLOATING CART ===== */}
                    {cartCount > 0 && (
                        <button onClick={() => setShowCart(true)} className="floating-cart btn-primary rounded-full w-14 h-14 flex items-center justify-center shadow-lg shadow-primary/30 md:hidden">
                            <Icon name="shoppingCart" size={22} />
                            <span className="cart-badge" style={{ position: 'absolute', top: '-6px', left: '-6px', background: '#FF6B35', color: '#fff', fontSize: '11px', fontWeight: 700, width: '20px', height: '20px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'monospace' }}>{cartCount}</span>
                        </button>
                    )}

                    {/* ===== MODALS ===== */}
                    {selectedProduct && (
                        <ProductDetail product={selectedProduct} onClose={() => setSelectedProduct(null)} onAddCart={addToCart} whatsappNumber={waNumber} />
                    )}
                    <CartModal open={showCart} onClose={() => setShowCart(false)} cart={cart} setCart={setCart} onCheckout={() => { setShowCart(false);
                        setShowCheckout(true); }} />
                    <CheckoutModal open={showCheckout} onClose={() => setShowCheckout(false)} cart={cart} setCart={setCart} settings={settings} onOrderComplete={() => {}} />
                    <AdminPanel open={showAdmin} onClose={() => setShowAdmin(false)} onDataChange={() => {}} />
                </div>
            );
        }

        // ============================================================
        //  RENDER
        // ============================================================
        function Root() {
            return ( <ToastProvider>
                <App />
            </ToastProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
