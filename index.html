  .receipt-card::before, .receipt-card::after {
    content: '';

    top: 50%;
    transform: translateY(-50%);
    z-index: 2;

/* ═══════════════ STORAGE ENGINE ═══════════════ */
const Storage = {
  _key(k) { return STORAGE_PREFIX + k; },

  get(key, fallback = null) {
    try {
      const raw = localStorage.getItem(this._key(key));
      if (raw === null || raw === undefined) return fallback;
      return JSON.parse(raw);
    } catch (e) {
      console.error('Storage get error:', key, e);
      return fallback;
    }
  },

 async set(key, value) {
    try {
      localStorage.setItem(this._key(key), JSON.stringify(value));
      await db.ref(key).set(value); // الحفظ السحابي
      return { success: true };
    } catch (e) {
      console.error('Firebase save error:', e);
      return { success: false, error: 'failed', message: e.message };
    }
  },

 remove(key) {
    try { 
      localStorage.removeItem(this._key(key)); 
      db.ref(key).remove(); 
    } catch(e) {}
  },   // ✅ أضف هذه الفاصلة

  // Category-split product storage
  async saveProducts(categoryId, products) {
    try {
      localStorage.setItem(this._key('products_' + categoryId), JSON.stringify(products));
      await db.ref(`products/${categoryId}`).set(products); // حفظ المنتجات سحابياً
      return { success: true };
    } catch (e) {
      return { success: false, error: 'failed', message: e.message };
    }
  },

  getProducts(categoryId) {
    return this.get('products_' + categoryId, []);
  },

  getAllProducts(categories) {
    let all = [];
    for (const cat of categories) {
      const prods = this.getProducts(cat.id);
      all = all.concat(prods);
    }
    return all;
  },

  async init() {
    // Initialize defaults if empty
    const cats = this.get('categories');
    if (!cats) {
      await this.set('categories', DEFAULT_CATEGORIES);
      for (const cat of DEFAULT_CATEGORIES) {
        const prods = DEFAULT_PRODUCTS[cat.id] || [];
        await this.saveProducts(cat.id, prods);
      }
    }
    if (!this.get('settings')) await this.set('settings', DEFAULT_SETTINGS);
    if (!this.get('hero')) await this.set('hero', DEFAULT_HERO);
    if (!this.get('orders')) await this.set('orders', []);
  }
};

/* ═══════════════ IMAGE COMPRESSION ═══════════════ */
function compressImage(file, maxWidth = 800, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
        if (h > maxWidth) { w = (w * maxWidth) / h; h = maxWidth; }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1A1A1A';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        // Further reduce if still too large (>400KB)
        if (dataUrl.length > 400000 && quality > 0.4) {
          const lower = canvas.toDataURL('image/jpeg', 0.4);
          resolve(lower);
        } else {
          resolve(dataUrl);
        }
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ═══════════════ TOAST ═══════════════ */
const ToastContext = createContext();
const useToast = () => useContext(ToastContext);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastContext.Provider value={show}>
      {children}
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>
      ))}
    </ToastContext.Provider>
  );
}

/* ═══════════════ LAZY IMAGE ═══════════════ */
function LazyImage({ src, alt, className = '', ...props }) {
  const ref = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const [inView, setInView] = useState(false);
  const actualSrc = src || PLACEHOLDER_IMG;

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    if (!('IntersectionObserver' in window)) { setInView(true); return; }
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { rootMargin: '100px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  return (
    <img
      ref={ref}
      src={inView ? actualSrc : PLACEHOLDER_IMG}
      alt={alt || ''}
      loading="lazy"
      className={`lazy-img ${loaded ? 'loaded' : ''} ${className}`}
      onLoad={() => setLoaded(true)}
      onError={(e) => { e.target.src = PLACEHOLDER_IMG; setLoaded(true); }}
      {...props}
    />
  );
}

/* ═══════════════ MODAL SHELL ═══════════════ */
function Modal({ open, onClose, children, title, wide, className = '' }) {
  useEffect(() => {
    if (open) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  if (!open) return null;

  return (
    <div className={`modal-overlay ${wide ? 'admin-modal' : ''} ${className}`} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-panel" onClick={e => e.stopPropagation()}>
        {title && (
          <div className="flex items-center justify-between px-5 py-4 border-b border-ink-border shrink-0">
            <h2 className="font-cairo text-lg font-bold gold-text">{title}</h2>
            <button onClick={onClose} className="p-2 rounded-lg hover:bg-ink-card transition-colors">
              <Icon name="x" size={20} />
            </button>
          </div>
        )}
        <div className="modal-scroll">
          {children}
        </div>
      </div>
    </div>
  );
}

            <Icon name="shoppingCart" size={18} />
            أضف إلى السلة
          </button>
          <a href={waLink} target="_blank" rel="noopener noreferrer" className="whatsapp-btn !px-4 !py-3 !rounded-xl">
            <WhatsAppIcon size={20} />
            <span className="hidden sm:inline">واتساب</span>
          </a>
        </div>
      </div>
    </Modal>
  );
}

/* ═══════════════ CART ═══════════════ */
function CartModal({ open, onClose, cart, setCart, onCheckout }) {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const updateQty = (id, delta) => {
    setCart(prev => prev.map(i => {
      if (i.id !== id) return i;
      const q = Math.max(1, Math.min(i.stock, i.qty + delta));
      return { ...i, qty: q };
    }).filter(i => i.qty > 0));
  };
  const remove = (id) => setCart(prev => prev.filter(i => i.id !== id));

  return (
    <Modal open={open} onClose={onClose} title="سلة المشتريات">
      <div className="p-5">
        {cart.length === 0 ? (
          <div className="text-center py-12 text-gray-500">
            <Icon name="shoppingCart" size={48} className="mx-auto mb-3 opacity-30" />
            <p>السلة فارغة</p>
          </div>
        ) : (
          <>
            <div className="space-y-3 mb-5">
              {cart.map(item => (
                <div key={item.id} className="flex gap-3 p-3 rounded-xl bg-ink-card border border-ink-border">
                  <div className="w-16 h-16 rounded-lg overflow-hidden bg-ink-soft shrink-0">
                    <img src={(item.images && item.images[item.mainImage||0]) || PLACEHOLDER_IMG} alt="" className="w-full h-full object-cover" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-cairo font-semibold text-sm truncate">{item.name}</h4>
                    <p className="price font-mono text-gold text-sm">{formatPrice(item.price)} دج</p>
                    <div className="flex items-center gap-2 mt-1">
                      <button onClick={() => updateQty(item.id, -1)} className="w-7 h-7 rounded-md bg-ink-border flex items-center justify-center hover:bg-gold/20"><Icon name="minus" size={14} /></button>
                      <span className="font-mono text-sm w-6 text-center">{item.qty}</span>
                      <button onClick={() => updateQty(item.id, 1)} className="w-7 h-7 rounded-md bg-ink-border flex items-center justify-center hover:bg-gold/20"><Icon name="plus" size={14} /></button>
                      <button onClick={() => remove(item.id)} className="mr-auto text-red-400 p-1"><Icon name="trash" size={16} /></button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="border-t border-ink-border pt-4 mb-4">
              <div className="flex justify-between items-center mb-4">
                <span className="font-cairo font-bold">المجموع</span>
                <span className="price font-mono text-xl text-gold font-bold">{formatPrice(total)} دج</span>
              </div>
              <button onClick={onCheckout} className="w-full btn-gold rounded-xl py-3.5 text-sm font-bold flex items-center justify-center gap-2">
                إتمام الطلب
                <Icon name="arrowLeft" size={18} />
              </button>
            </div>
          </>
        )}
      </div>
    </Modal>
  );
}

/* ═══════════════ CHECKOUT ═══════════════ */
function CheckoutModal({ open, onClose, cart, setCart, settings, onOrderComplete }) {
  const toast = useToast();
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    name: '', phone: '', wilaya: '', commune: '', delivery: 'Yalidine',
    payment: 'cod', discountCode: '', otherDelivery: ''
  });
  const [discount, setDiscount] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [trackingId, setTrackingId] = useState(null);

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const discountAmount = discount ? Math.round(subtotal * discount.percent / 100) : 0;
  const total = subtotal - discountAmount;

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const applyDiscount = () => {
    const code = form.discountCode.trim().toUpperCase();
    const found = (settings.discountCodes || []).find(c => c.code.toUpperCase() === code);
    if (found) {
      setDiscount(found);
      toast(`تم تطبيق خصم ${found.percent}%`, 'success');
    } else {
      setDiscount(null);
      toast('كود الخصم غير صالح', 'error');
    }
  };

  const canNext = () => {
    if (step === 0) return form.name.trim().length >= 2 && form.phone.trim().length >= 9;
    if (step === 1) return form.wilaya && form.commune.trim().length >= 2 && form.delivery;
    if (step === 2) return form.payment;
    return true;
  };

  const submitOrder = async () => {
    setSubmitting(true);
    const tid = generateTrackingId();
    const order = {
      id: generateId('ord'),
      trackingId: tid,
      customer: { name: form.name.trim(), phone: form.phone.trim() },
      delivery: {
        wilaya: form.wilaya,
        commune: form.commune.trim(),
        company: form.delivery === 'أخرى' ? form.otherDelivery || 'أخرى' : form.delivery
      },
      payment: form.payment,
      discount: discount,
      items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
      subtotal, discountAmount, total,
      status: 'pending',
      createdAt: new Date().toISOString()
    };

    const orders = Storage.get('orders', []);
    orders.unshift(order);
    const result = await Storage.set('orders', orders);

    // Decrease stock
    if (result.success) {
      const cats = Storage.get('categories', []);
      for (const item of cart) {
        for (const cat of cats) {
          const prods = Storage.getProducts(cat.id);
          const idx = prods.findIndex(p => p.id === item.id);
          if (idx >= 0) {
            prods[idx].stock = Math.max(0, (prods[idx].stock || 0) - item.qty);
            await Storage.saveProducts(cat.id, prods);
            break;
          }
        }
      }
      setTrackingId(tid);
      setCart([]);
      onOrderComplete && onOrderComplete();
      toast('تم تأكيد طلبك بنجاح!', 'success');
    } else {
      toast(result.message || 'فشل حفظ الطلب', 'error');
    }
    setSubmitting(false);
  };

  const steps = ['بيانات الزبون', 'التوصيل', 'الدفع', 'المراجعة'];

  if (trackingId) {
    return (
      <Modal open={open} onClose={onClose} title="تم تأكيد الطلب">
        <div className="p-6 text-center">
          <div className="w-20 h-20 rounded-full gold-gradient flex items-center justify-center mx-auto mb-4">
            <Icon name="checkCircle" size={40} className="text-ink" />
          </div>
          <h3 className="font-cairo text-xl font-bold mb-2">شكراً لطلبك!</h3>
          <p className="text-gray-400 text-sm mb-4">تم استلام طلبك بنجاح. احتفظ برقم التتبع التالي:</p>
          <div className="bg-ink-card border-2 border-dashed border-gold rounded-xl p-4 mb-4">
            <p className="text-xs text-gray-400 mb-1">رقم التتبع</p>
            <p className="track-code font-mono text-2xl text-gold font-bold tracking-wider">{trackingId}</p>
          </div>
          <p className="text-sm text-gray-400 mb-6">سنتواصل معك على الرقم {form.phone} لتأكيد الطلب</p>
          <button onClick={onClose} className="btn-gold rounded-xl px-8 py-3">حسناً</button>
        </div>
      </Modal>
    );
  }

  return (
    <Modal open={open} onClose={onClose} title="إتمام الطلب">
      <div className="p-5">
        {/* Steps indicator */}
        <div className="flex items-center justify-between mb-6 px-2">
          {steps.map((s, i) => (
            <React.Fragment key={i}>
              <div className="flex flex-col items-center gap-1">
                <div className={`step-dot w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold font-mono ${i === step ? 'active' : i < step ? 'done' : 'bg-ink-border text-gray-500'}`}>
                  {i < step ? <Icon name="check" size={14} /> : i + 1}
                </div>
                <span className={`text-[10px] ${i === step ? 'text-gold' : 'text-gray-500'}`}>{s}</span>
              </div>
              {i < steps.length - 1 && <div className={`step-line flex-1 h-0.5 mx-1 mb-4 ${i < step ? 'done' : 'bg-ink-border'}`} />}
            </React.Fragment>
          ))}
        </div>

        {/* Step 0: Customer */}
        {step === 0 && (
          <div className="space-y-4">
            <div>
              <label className="block text-sm mb-1.5 text-gray-300">الاسم الكامل <span className="text-accent">*</span></label>
              <input value={form.name} onChange={e => set('name', e.target.value)} placeholder="أدخل اسمك الكامل" />
            </div>
            <div>
              <label className="block text-sm mb-1.5 text-gray-300">رقم الهاتف <span className="text-accent">*</span></label>
              <input type="tel" value={form.phone} onChange={e => set('phone', e.target.value)} placeholder="05XXXXXXXX" dir="ltr" className="text-left" />
            </div>
          </div>
        )}

        {/* Step 1: Delivery */}
        {step === 1 && (
          <div className="space-y-4">
            <div>
              <label className="block text-sm mb-1.5 text-gray-300">الولاية <span className="text-accent">*</span></label>
              <select value={form.wilaya} onChange={e => set('wilaya', e.target.value)}>
                <option value="">اختر الولاية</option>
                {WILAYAS.map(w => <option key={w} value={w}>{w}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-sm mb-1.5 text-gray-300">البلدية <span className="text-accent">*</span></label>
              <input value={form.commune} onChange={e => set('commune', e.target.value)} placeholder="أدخل اسم البلدية" />
            </div>
            <div>
              <label className="block text-sm mb-1.5 text-gray-300">شركة التوصيل</label>
              <div className="grid grid-cols-2 gap-2">
                {DELIVERY_COMPANIES.map(c => (
                  <button key={c} type="button" onClick={() => set('delivery', c)}
                    className={`py-2.5 px-3 rounded-lg text-sm border transition-all ${form.delivery === c ? 'border-gold bg-gold/10 text-gold' : 'border-ink-border text-gray-400 hover:border-gray-500'}`}>
                    {c}
                  </button>
                ))}
              </div>
              {form.delivery === 'أخرى' && (
                <input className="mt-2" value={form.otherDelivery} onChange={e => set('otherDelivery', e.target.value)} placeholder="اسم شركة التوصيل" />
              )}
            </div>
          </div>
        )}

        {/* Step 2: Payment */}
        {step === 2 && (
          <div className="space-y-4">
            <div>
              <label className="block text-sm mb-2 text-gray-300">طريقة الدفع</label>
              <div className="space-y-2">
                <button type="button" onClick={() => set('payment', 'cod')}
                  className={`w-full p-4 rounded-xl border text-right transition-all ${form.payment === 'cod' ? 'border-gold bg-gold/10' : 'border-ink-border'}`}>
                  <div className="font-semibold text-sm">الدفع عند الاستلام</div>
                  <div className="text-xs text-gray-400 mt-0.5">ادفع نقداً عند استلام طلبك</div>
                </button>
                <button type="button" onClick={() => set('payment', 'ccp')}
                  className={`w-full p-4 rounded-xl border text-right transition-all ${form.payment === 'ccp' ? 'border-gold bg-gold/10' : 'border-ink-border'}`}>
                  <div className="font-semibold text-sm">تحويل CCP</div>
                  <div className="text-xs text-gray-400 mt-0.5">حوّل المبلغ عبر حساب CCP</div>
                </button>
              </div>
            </div>
            {form.payment === 'ccp' && (
              <div className="p-4 rounded-xl bg-ink-card border border-dashed border-gold">
                <p className="text-xs text-gray-400 mb-1">رقم حساب CCP</p>
                <p className="font-mono text-gold text-lg font-bold" dir="ltr">{settings.ccpAccount}</p>
                <p className="text-xs text-gray-400 mt-2 mb-0.5">اسم صاحب الحساب</p>
                <p className="font-semibold">{settings.ccpName}</p>
              </div>
            )}
            <div>
              <label className="block text-sm mb-1.5 text-gray-300">كود خصم (اختياري)</label>
              <div className="flex gap-2">
                <input value={form.discountCode} onChange={e => set('discountCode', e.target.value)} placeholder="أدخل كود الخصم" className="flex-1" />
                <button onClick={applyDiscount} className="btn-outline-gold rounded-lg px-4 text-sm shrink-0">تطبيق</button>
              </div>
              {discount && <p className="text-green-400 text-xs mt-1">خصم {discount.percent}% مطبّق</p>}
            </div>
          </div>
        )}

        {/* Step 3: Review */}
        {step === 3 && (
          <div className="space-y-4">
            <div className="p-4 rounded-xl bg-ink-card border border-ink-border space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-gray-400">الاسم</span><span>{form.name}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">الهاتف</span><span className="font-mono" dir="ltr">{form.phone}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">العنوان</span><span>{form.commune}، {form.wilaya}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">التوصيل</span><span>{form.delivery === 'أخرى' ? form.otherDelivery : form.delivery}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">الدفع</span><span>{form.payment === 'cod' ? 'عند الاستلام' : 'تحويل CCP'}</span></div>
            </div>
            <div className="space-y-2">
              {cart.map(i => (
                <div key={i.id} className="flex justify-between text-sm">
                  <span className="text-gray-300">{i.name} × {i.qty}</span>
                  <span className="font-mono text-gold">{formatPrice(i.price * i.qty)}</span>
                </div>
              ))}
            </div>
            <div className="border-t border-ink-border pt-3 space-y-1">
              <div className="flex justify-between text-sm"><span className="text-gray-400">المجموع الفرعي</span><span className="font-mono">{formatPrice(subtotal)} دج</span></div>
              {discount && <div className="flex justify-between text-sm text-green-400"><span>خصم ({discount.percent}%)</span><span className="font-mono">-{formatPrice(discountAmount)} دج</span></div>}
              <div className="flex justify-between font-bold text-base pt-1"><span>الإجمالي</span><span className="font-mono text-gold text-lg">{formatPrice(total)} دج</span></div>
            </div>
          </div>
        )}

        {/* Navigation */}
        <div className="flex gap-3 mt-6 pb-2">
          {step > 0 && (
            <button onClick={() => setStep(s => s - 1)} className="btn-outline-gold rounded-xl px-5 py-3 text-sm flex items-center gap-1">
              <Icon name="chevronRight" size={16} /> السابق
            </button>
          )}
          {step < 3 ? (
            <button disabled={!canNext()} onClick={() => setStep(s => s + 1)}
              className={`flex-1 btn-gold rounded-xl py-3 text-sm flex items-center justify-center gap-1 ${!canNext() ? 'opacity-40 cursor-not-allowed' : ''}`}>
              التالي <Icon name="chevronLeft" size={16} />
            </button>
          ) : (
            <button disabled={submitting} onClick={submitOrder}
              className={`flex-1 btn-gold rounded-xl py-3 text-sm flex items-center justify-center gap-2 ${submitting ? 'opacity-60' : ''}`}>
              {submitting ? 'جاري التأكيد...' : 'تأكيد الطلب'}
              <Icon name="check" size={16} />
            </button>
          )}
        </div>
      </div>
    </Modal>
  );
}

/* ═══════════════ ADMIN PANEL ═══════════════ */
function AdminPanel({ open, onClose, onDataChange }) {
  const toast = useToast();
  const [authed, setAuthed] = useState(false);
  const [pinInput, setPinInput] = useState('');
  const [tab, setTab] = useState('products');
  const [settings, setSettings] = useState(() => Storage.get('settings', DEFAULT_SETTINGS));
  const [hero, setHero] = useState(() => Storage.get('hero', DEFAULT_HERO));
  const [categories, setCategories] = useState(() => Storage.get('categories', DEFAULT_CATEGORIES));
  const [orders, setOrders] = useState(() => Storage.get('orders', []));
  const [products, setProducts] = useState({});
  const [editingProduct, setEditingProduct] = useState(null);
  const [editingCat, setEditingCat] = useState(null);
  const [newCatName, setNewCatName] = useState('');
  const [saving, setSaving] = useState(false);
  const [newPin, setNewPin] = useState('');
  const [confirmPin, setConfirmPin] = useState('');
  const [filterStatus, setFilterStatus] = useState('all');
  const [selectedCat, setSelectedCat] = useState('');

  // Load products for all categories
 const loadProducts = useCallback(() => {}, []);
  useEffect(() => {
    if (open && authed) {
      // مزامنة فورية للوحة الإدارة
      db.ref('categories').on('value', s => setCategories(s.val() || DEFAULT_CATEGORIES));
      db.ref('products').on('value', s => setProducts(s.val() || {}));
      db.ref('orders').on('value', s => setOrders(s.val() || []));
      db.ref('settings').on('value', s => setSettings(s.val() || DEFAULT_SETTINGS));
      db.ref('hero').on('value', s => setHero(s.val() || DEFAULT_HERO));
    }
  }, [open, authed]);

  useEffect(() => {
    if (!open) {
      setAuthed(false);
      setPinInput('');
      setTab('products');
      setEditingProduct(null);
    }
  }, [open]);

  const handleLogin = () => {
    const s = Storage.get('settings', DEFAULT_SETTINGS);
    if (pinInput === s.pin) {
      setAuthed(true);
      setPinInput('');
    } else {
      toast('الرمز السري غير صحيح', 'error');
    }
  };

  const saveWithFeedback = async (key, value, customSave) => {
    setSaving(true);
    let result;
    if (customSave) {
      result = await customSave();
    } else {
      result = await Storage.set(key, value);
    }
    setSaving(false);
    if (result.success) {
      toast('تم الحفظ بنجاح', 'success');
      onDataChange && onDataChange();
      return true;
    } else {
      toast(result.message || 'فشل الحفظ', 'error');
      return false;
    }
  };

  /* --- Categories --- */
  const addCategory = async () => {
    if (!newCatName.trim()) return;
    const cat = { id: generateId('cat'), name: newCatName.trim(), order: categories.length };
    const updated = [...categories, cat];
    const ok = await saveWithFeedback('categories', updated);
    if (ok) {
      await Storage.saveProducts(cat.id, []);
      setCategories(updated);
      setProducts(p => ({ ...p, [cat.id]: [] }));
      setNewCatName('');
    }
  };

  const renameCategory = async (id, name) => {
    const updated = categories.map(c => c.id === id ? { ...c, name } : c);
    const ok = await saveWithFeedback('categories', updated);
    if (ok) { setCategories(updated); setEditingCat(null); }
  };

  const deleteCategory = async (id) => {
    if (!confirm('هل أنت متأكد من حذف هذه الفئة وجميع منتجاتها؟')) return;
    const updated = categories.filter(c => c.id !== id);
    const ok = await saveWithFeedback('categories', updated);
    if (ok) {
      Storage.remove('products_' + id);
      setCategories(updated);
      setProducts(p => { const n = { ...p }; delete n[id]; return n; });
    }
  };

  /* --- Products --- */
  const emptyProduct = () => ({
    id: generateId('p'), name: '', price: 0, description: '', images: [], mainImage: 0,
    stock: 0, bestSeller: false, categoryId: categories[0]?.id || ''
  });

  const saveProduct = async (prod) => {
    if (!prod.name.trim() || !prod.categoryId) {
      toast('الاسم والفئة مطلوبان', 'error');
      return;
    }
    const catId = prod.categoryId;
    let prods = [...(products[catId] || [])];
    // Remove from old category if moved
    if (editingProduct && editingProduct._origCat && editingProduct._origCat !== catId) {
      const oldProds = (products[editingProduct._origCat] || []).filter(p => p.id !== prod.id);
      await Storage.saveProducts(editingProduct._origCat, oldProds);
    }
    const idx = prods.findIndex(p => p.id === prod.id);
    if (idx >= 0) prods[idx] = prod;
    else prods.push(prod);

    const ok = await saveWithFeedback(null, null, () => Storage.saveProducts(catId, prods));
    if (ok) {
      loadProducts();
      setEditingProduct(null);
    }
  };

  const deleteProduct = async (prod) => {
    if (!confirm('حذف هذا المنتج؟')) return;
    const prods = (products[prod.categoryId] || []).filter(p => p.id !== prod.id);
    const ok = await saveWithFeedback(null, null, () => Storage.saveProducts(prod.categoryId, prods));
    if (ok) loadProducts();
  };

  const handleImageUpload = async (e, prod, setProd) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const current = prod.images || [];
    if (current.length + files.length > 4) {
      toast('الحد الأقصى 4 صور', 'error');
      return;
    }
    toast('جاري ضغط الصور...', 'info');
    try {
      const compressed = [];
      for (const f of files) {
        const data = await compressImage(f);
        compressed.push(data);
      }
      setProd({ ...prod, images: [...current, ...compressed] });
      toast('تم رفع الصور', 'success');
    } catch (err) {
      toast('فشل رفع الصور', 'error');
    }
  };

  /* --- Orders --- */
  const updateOrderStatus = async (orderId, status) => {
    const updated = orders.map(o => o.id === orderId ? { ...o, status } : o);
    const ok = await saveWithFeedback('orders', updated);
    if (ok) setOrders(updated);
  };

  /* --- Settings --- */
  const saveSettings = async () => {
    await saveWithFeedback('settings', settings);
  };

  const changePin = async () => {
    if (newPin.length < 4) { toast('الرمز يجب أن يكون 4 أرقام على الأقل', 'error'); return; }
    if (newPin !== confirmPin) { toast('الرمزان غير متطابقين', 'error'); return; }
    const updated = { ...settings, pin: newPin };
    const ok = await saveWithFeedback('settings', updated);
    if (ok) { setSettings(updated); setNewPin(''); setConfirmPin(''); toast('تم تغيير الرمز السري', 'success'); }
  };

  const saveHero = async () => {
    await saveWithFeedback('hero', hero);
  };

  const handleLogoUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const data = await compressImage(file, 400, 0.8);
      const updated = { ...settings, logo: data };
      const ok = await saveWithFeedback('settings', updated);
      if (ok) setSettings(updated);
    } catch { toast('فشل رفع الشعار', 'error'); }
  };

  // Filtered orders
  const filteredOrders = filterStatus === 'all' ? orders : orders.filter(o => o.status === filterStatus);

  // All products flat for listing
  const allProductsList = useMemo(() => {
    let list = [];
    Object.entries(products).forEach(([catId, prods]) => {
      prods.forEach(p => list.push({ ...p, categoryId: catId }));
    });
    if (selectedCat) list = list.filter(p => p.categoryId === selectedCat);
    return list;
  }, [products, selectedCat]);

  /* --- PIN Login --- */
  if (!authed) {
    return (
      <Modal open={open} onClose={onClose} title="لوحة الإدارة">
        <div className="p-8 text-center">
          <div className="w-16 h-16 rounded-full bg-ink-card border border-gold/30 flex items-center justify-center mx-auto mb-4">
            <Icon name="lock" size={28} className="text-gold" />
          </div>
          <h3 className="font-cairo font-bold text-lg mb-1">أدخل الرمز السري</h3>
          <p className="text-gray-500 text-sm mb-6">للوصول إلى لوحة التحكم</p>
          <input
            type="password"
            inputMode="numeric"
            value={pinInput}
            onChange={e => setPinInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            placeholder="••••"
            className="text-center text-2xl font-mono tracking-[0.5em] max-w-[200px] mx-auto mb-4"
            autoFocus
          />
          <button onClick={handleLogin} className="btn-gold rounded-xl px-10 py-3 w-full max-w-[200px]">دخول</button>
        </div>
      </Modal>
    );
  }

  /* --- Product Editor --- */
  if (editingProduct) {
    const prod = editingProduct;
    const setProd = setEditingProduct;
    return (
      <Modal open={open} onClose={() => setEditingProduct(null)} title={prod._isNew ? 'إضافة منتج' : 'تعديل منتج'} wide>
        <div className="p-5 space-y-4">
          <div>
            <label className="text-sm text-gray-300 mb-1 block">اسم المنتج *</label>
            <input value={prod.name} onChange={e => setProd({ ...prod, name: e.target.value })} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-sm text-gray-300 mb-1 block">السعر (دج) *</label>
              <input type="number" value={prod.price} onChange={e => setProd({ ...prod, price: Number(e.target.value) || 0 })} className="font-mono" dir="ltr" />
            </div>
            <div>
              <label className="text-sm text-gray-300 mb-1 block">المخزون</label>
              <input type="number" value={prod.stock} onChange={e => setProd({ ...prod, stock: Number(e.target.value) || 0 })} className="font-mono" dir="ltr" />
            </div>
          </div>
          <div>
            <label className="text-sm text-gray-300 mb-1 block">الفئة *</label>
            <select value={prod.categoryId} onChange={e => setProd({ ...prod, categoryId: e.target.value })}>
              {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label className="text-sm text-gray-300 mb-1 block">الوصف</label>
            <textarea rows={3} value={prod.description || ''} onChange={e => setProd({ ...prod, description: e.target.value })} />
          </div>
          <div>
            <label className="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" checked={!!prod.bestSeller} onChange={e => setProd({ ...prod, bestSeller: e.target.checked })} className="!w-auto" />
              وسم كـ "الأكثر مبيعاً"
            </label>
          </div>
          {/* Images */}
          <div>
            <label className="text-sm text-gray-300 mb-2 block">الصور (حتى 4) — انقر لاختيار الصورة الرئيسية</label>
            <div className="flex flex-wrap gap-2 mb-2">
              {(prod.images || []).map((img, i) => (
                <div key={i} className={`relative w-20 h-20 rounded-lg overflow-hidden border-2 cursor-pointer ${prod.mainImage === i ? 'border-gold' : 'border-ink-border'}`}
                  onClick={() => setProd({ ...prod, mainImage: i })}>
                  <img src={img} alt="" className="w-full h-full object-cover" />
                  <button onClick={(e) => { e.stopPropagation(); const imgs = prod.images.filter((_, j) => j !== i); setProd({ ...prod, images: imgs, mainImage: Math.min(prod.mainImage, Math.max(0, imgs.length - 1)) }); }}
                    className="absolute top-0 left-0 bg-red-500 text-white w-5 h-5 flex items-center justify-center text-xs rounded-br">×</button>
                  {prod.mainImage === i && <span className="absolute bottom-0 inset-x-0 bg-gold text-ink text-[9px] text-center font-bold">رئيسية</span>}
                </div>
              ))}
              {(prod.images || []).length < 4 && (
                <label className="w-20 h-20 rounded-lg border-2 border-dashed border-ink-border flex items-center justify-center cursor-pointer hover:border-gold transition-colors">
                  <Icon name="upload" size={20} className="text-gray-500" />
                  <input type="file" accept="image/*" multiple className="hidden" onChange={e => handleImageUpload(e, prod, setProd)} />
                </label>
              )}
            </div>
          </div>
          <div className="flex gap-3 pt-2 pb-4">
            <button onClick={() => saveProduct(prod)} disabled={saving} className="flex-1 btn-gold rounded-xl py-3 text-sm">
              {saving ? 'جاري الحفظ...' : 'حفظ المنتج'}
            </button>
            <button onClick={() => setEditingProduct(null)} className="btn-outline-gold rounded-xl px-6 py-3 text-sm">إلغاء</button>
          </div>
        </div>
      </Modal>
    );
  }

  /* --- Main Admin --- */
  const tabs = [
    { id: 'products', label: 'المنتجات', icon: 'package' },
    { id: 'categories', label: 'الفئات', icon: 'tag' },
    { id: 'orders', label: 'الطلبات', icon: 'clipboard' },
    { id: 'hero', label: 'الصفحة الرئيسية', icon: 'home' },
    { id: 'settings', label: 'الإعدادات', icon: 'settings' },
  ];

  return (
    <Modal open={open} onClose={onClose} title="لوحة الإدارة — Adrimtex" wide>
      {/* Tabs */}
      <div className="flex gap-1 px-4 pt-3 pb-2 overflow-x-auto border-b border-ink-border shrink-0">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className={`admin-tab flex items-center gap-1.5 ${tab === t.id ? 'active' : 'text-gray-400'}`}>
            <Icon name={t.icon} size={16} />
            {t.label}
          </button>
        ))}
      </div>

      <div className="p-5">
        {/* PRODUCTS TAB */}
        {tab === 'products' && (
          <div>
            <div className="flex flex-wrap gap-2 mb-4 items-center">
              <button onClick={() => setEditingProduct({ ...emptyProduct(), _isNew: true, _origCat: null })} className="btn-gold rounded-lg px-4 py-2 text-sm flex items-center gap-1">
                <Icon name="plus" size={16} /> إضافة منتج
              </button>
              <select value={selectedCat} onChange={e => setSelectedCat(e.target.value)} className="!w-auto text-sm">
                <option value="">كل الفئات</option>
                {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <span className="text-xs text-gray-500 mr-auto font-mono">{allProductsList.length} منتج</span>
            </div>
            <div className="space-y-2">
              {allProductsList.map(p => (
                <div key={p.id} className="flex items-center gap-3 p-3 rounded-xl bg-ink-card border border-ink-border">
                  <div className="w-12 h-12 rounded-lg overflow-hidden bg-ink-soft shrink-0">
                    <img src={(p.images && p.images[p.mainImage||0]) || PLACEHOLDER_IMG} alt="" className="w-full h-full object-cover" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-cairo font-semibold text-sm truncate">{p.name}</h4>
                    <div className="flex gap-3 text-xs text-gray-400">
                      <span className="font-mono text-gold">{formatPrice(p.price)} دج</span>
                      <span>مخزون: {p.stock}</span>
                      {p.bestSeller && <span className="text-accent">★ الأكثر مبيعاً</span>}
                    </div>
                  </div>
                  <button onClick={() => setEditingProduct({ ...p, _isNew: false, _origCat: p.categoryId })} className="p-2 rounded-lg hover:bg-ink-border"><Icon name="edit" size={16} /></button>
                  <button onClick={() => deleteProduct(p)} className="p-2 rounded-lg hover:bg-red-900/30 text-red-400"><Icon name="trash" size={16} /></button>
                </div>
              ))}
              {allProductsList.length === 0 && <p className="text-center text-gray-500 py-8">لا توجد منتجات</p>}
            </div>
          </div>
        )}

        {/* CATEGORIES TAB */}
        {tab === 'categories' && (
          <div>
            <div className="flex gap-2 mb-4">
              <input value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="اسم الفئة الجديدة" className="flex-1" />
              <button onClick={addCategory} className="btn-gold rounded-lg px-4 py-2 text-sm shrink-0 flex items-center gap-1">
                <Icon name="plus" size={16} /> إضافة
              </button>
            </div>
            <div className="space-y-2">
              {categories.map(c => (
                <div key={c.id} className="flex items-center gap-3 p-3 rounded-xl bg-ink-card border border-ink-border">
                  {editingCat === c.id ? (
                    <input
                      autoFocus
                      defaultValue={c.name}
                      onKeyDown={e => { if (e.key === 'Enter') renameCategory(c.id, e.target.value); if (e.key === 'Escape') setEditingCat(null); }}
                      onBlur={e => renameCategory(c.id, e.target.value)}
                      className="flex-1"
                    />
                  ) : (
                    <div className="flex-1">
                      <span className="font-cairo font-semibold">{c.name}</span>
                      <span className="text-xs text-gray-500 mr-2 font-mono">({(products[c.id] || []).length} منتج)</span>
                    </div>
                  )}
                  <button onClick={() => setEditingCat(c.id)} className="p-2 rounded-lg hover:bg-ink-border"><Icon name="edit" size={16} /></button>
                  <button onClick={() => deleteCategory(c.id)} className="p-2 rounded-lg hover:bg-red-900/30 text-red-400"><Icon name="trash" size={16} /></button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ORDERS TAB */}
        {tab === 'orders' && (
          <div>
            <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
              <button onClick={() => setFilterStatus('all')} className={`admin-tab text-xs ${filterStatus === 'all' ? 'active' : 'text-gray-400'}`}>الكل ({orders.length})</button>
              {ORDER_STATUSES.map(s => (
                <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`admin-tab text-xs ${filterStatus === s.id ? 'active' : 'text-gray-400'}`}>
                  {s.label} ({orders.filter(o => o.status === s.id).length})
                </button>
              ))}
            </div>
            <div className="space-y-3">
              {filteredOrders.map(o => {
                const st = ORDER_STATUSES.find(s => s.id === o.status) || ORDER_STATUSES[0];
                return (
                  <div key={o.id} className="p-4 rounded-xl bg-ink-card border border-ink-border">
                    <div className="flex flex-wrap items-start justify-between gap-2 mb-2">
                      <div>
                        <span className="track-code font-mono text-gold text-sm font-bold">{o.trackingId}</span>
                        <span className={`status-badge ${st.cls} mr-2`}>{st.label}</span>
                      </div>
                      <span className="text-xs text-gray-500 font-mono">{new Date(o.createdAt).toLocaleDateString('ar-DZ')}</span>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-1 text-sm mb-2">
                      <div><span className="text-gray-500">الزبون:</span> {o.customer.name}</div>
                      <div><span className="text-gray-500">الهاتف:</span> <a href={`tel:${o.customer.phone}`} className="text-gold font-mono" dir="ltr">{o.customer.phone}</a></div>
                      <div><span className="text-gray-500">العنوان:</span> {o.delivery.commune}، {o.delivery.wilaya}</div>
                      <div><span className="text-gray-500">التوصيل:</span> {o.delivery.company}</div>
                      <div><span className="text-gray-500">الدفع:</span> {o.payment === 'cod' ? 'عند الاستلام' : 'CCP'}</div>
                      <div><span className="text-gray-500">المجموع:</span> <span className="font-mono text-gold font-bold">{formatPrice(o.total)} دج</span></div>
                    </div>
                    <div className="text-xs text-gray-400 mb-2">
                      المنتجات: {o.items.map(i => `${i.name} ×${i.qty}`).join(' | ')}
                    </div>
                    <select value={o.status} onChange={e => updateOrderStatus(o.id, e.target.value)} className="text-sm !w-auto">
                      {ORDER_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                  </div>
                );
              })}
              {filteredOrders.length === 0 && <p className="text-center text-gray-500 py-8">لا توجد طلبات</p>}
            </div>
          </div>
        )}

        {/* HERO TAB */}
        {tab === 'hero' && (
          <div className="space-y-4">
            <div>
              <label className="text-sm text-gray-300 mb-1 block">العنوان الرئيسي</label>
              <input value={hero.title} onChange={e => setHero({ ...hero, title: e.target.value })} />
            </div>
            <div>
              <label className="text-sm text-gray-300 mb-1 block">النص الفرعي</label>
              <input value={hero.subtitle} onChange={e => setHero({ ...hero, subtitle: e.target.value })} />
            </div>
            <div>
              <label className="text-sm text-gray-300 mb-1 block">الوصف التعريفي</label>
              <textarea rows={3} value={hero.description} onChange={e => setHero({ ...hero, description: e.target.value })} />
            </div>
            <div>
              <label className="text-sm text-gray-300 mb-1 block">رابط فيديو (يوتيوب أو مباشر) — اتركه فارغاً للحذف</label>
              <input value={hero.videoUrl || ''} onChange={e => setHero({ ...hero, videoUrl: e.target.value })} placeholder="https://www.youtube.com/embed/..." dir="ltr" className="text-left" />
            </div>
            <div>
              <label className="text-sm text-gray-300 mb-1 block">أرقام الهواتف (مفصولة بفاصلة)</label>
              <input value={(hero.phones || []).join(', ')} onChange={e => setHero({ ...hero, phones: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })} dir="ltr" className="text-left" placeholder="0555123456, 0666789012" />
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label className="text-sm text-gray-300 mb-1 block">فيسبوك</label>
                <input value={hero.social?.facebook || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, facebook: e.target.value } })} dir="ltr" className="text-left" />
              </div>
              <div>
                <label className="text-sm text-gray-300 mb-1 block">إنستغرام</label>
                <input value={hero.social?.instagram || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, instagram: e.target.value } })} dir="ltr" className="text-left" />
              </div>
              <div>
                <label className="text-sm text-gray-300 mb-1 block">واتساب (رقم دولي)</label>
                <input value={hero.social?.whatsapp || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, whatsapp: e.target.value } })} dir="ltr" className="text-left" placeholder="213555123456" />
              </div>
              <div>
                <label className="text-sm text-gray-300 mb-1 block">تيك توك</label>
                <input value={hero.social?.tiktok || ''} onChange={e => setHero({ ...hero, social: { ...hero.social, tiktok: e.target.value } })} dir="ltr" className="text-left" />
              </div>
            </div>
            <button onClick={saveHero} disabled={saving} className="btn-gold rounded-xl px-8 py-3 text-sm flex items-center gap-2">
              <Icon name="save" size={16} /> {saving ? 'جاري الحفظ...' : 'حفظ الصفحة الرئيسية'}
            </button>
          </div>
        )}

        {/* SETTINGS TAB */}
        {tab === 'settings' && (
          <div className="space-y-6">
            {/* Logo */}
            <div>
              <h4 className="font-cairo font-bold text-gold mb-3">شعار المتجر</h4>
              <div className="flex items-center gap-4">
                {settings.logo ? (
                  <img src={settings.logo} alt="Logo" className="w-20 h-20 rounded-xl object-contain bg-ink-card border border-ink-border" />
                ) : (
                  <div className="w-20 h-20 rounded-xl bg-ink-card border border-dashed border-ink-border flex items-center justify-center text-gray-600 text-xs">لا يوجد</div>
                )}
                <div>
                  <label className="btn-outline-gold rounded-lg px-4 py-2 text-sm cursor-pointer inline-flex items-center gap-1">
                    <Icon name="upload" size={14} /> رفع شعار
                    <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} />
                  </label>
                  {settings.logo && (
                    <button onClick={async () => { const u = { ...settings, logo: '' }; const ok = await saveWithFeedback('settings', u); if (ok) setSettings(u); }} className="block text-red-400 text-xs mt-2">حذف الشعار</button>
                  )}
                </div>
              </div>
            </div>

            {/* CCP */}
            <div>
              <h4 className="font-cairo font-bold text-gold mb-3">حساب CCP</h4>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label className="text-sm text-gray-300 mb-1 block">رقم الحساب</label>
                  <input value={settings.ccpAccount || ''} onChange={e => setSettings({ ...settings, ccpAccount: e.target.value })} dir="ltr" className="text-left font-mono" />
                </div>
                <div>
                  <label className="text-sm text-gray-300 mb-1 block">اسم صاحب الحساب</label>
                  <input value={settings.ccpName || ''} onChange={e => setSettings({ ...settings, ccpName: e.target.value })} />
                </div>
              </div>
            </div>

            {/* WhatsApp */}
            <div>
              <h4 className="font-cairo font-bold text-gold mb-3">رقم واتساب المتجر</h4>
              <input value={settings.whatsappNumber || ''} onChange={e => setSettings({ ...settings, whatsappNumber: e.target.value })} dir="ltr" className="text-left font-mono" placeholder="213555123456" />
              <p className="text-xs text-gray-500 mt-1">بالصيغة الدولية بدون + (مثال: 213555123456)</p>
            </div>

            {/* Discount codes */}
            <div>
              <h4 className="font-cairo font-bold text-gold mb-3">أكواد الخصم</h4>
              <div className="space-y-2 mb-3">
                {(settings.discountCodes || []).map((dc, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <input value={dc.code} onChange={e => {
                      const codes = [...settings.discountCodes];
                      codes[i] = { ...codes[i], code: e.target.value.toUpperCase() };
                      setSettings({ ...settings, discountCodes: codes });
                    }} className="flex-1 font-mono" placeholder="CODE" dir="ltr" />
                    <input type="number" value={dc.percent} onChange={e => {
                      const codes = [...settings.discountCodes];
                      codes[i] = { ...codes[i], percent: Number(e.target.value) || 0 };
                      setSettings({ ...settings, discountCodes: codes });
                    }} className="!w-20 font-mono" dir="ltr" />
                    <span className="text-sm text-gray-400">%</span>
                    <button onClick={() => {
                      const codes = settings.discountCodes.filter((_, j) => j !== i);
                      setSettings({ ...settings, discountCodes: codes });
                    }} className="p-2 text-red-400"><Icon name="trash" size={16} /></button>
                  </div>
                ))}
              </div>
              <button onClick={() => setSettings({ ...settings, discountCodes: [...(settings.discountCodes || []), { code: '', percent: 10 }] })}
                className="btn-outline-gold rounded-lg px-4 py-2 text-sm flex items-center gap-1">
                <Icon name="plus" size={14} /> إضافة كود
              </button>
            </div>

            <button onClick={saveSettings} disabled={saving} className="btn-gold rounded-xl px-8 py-3 text-sm flex items-center gap-2">
              <Icon name="save" size={16} /> {saving ? 'جاري الحفظ...' : 'حفظ الإعدادات'}
            </button>

            {/* PIN change */}
            <div className="border-t border-ink-border pt-6">
              <h4 className="font-cairo font-bold text-gold mb-3">تغيير الرمز السري</h4>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                <div>
                  <label className="text-sm text-gray-300 mb-1 block">الرمز الجديد</label>
                  <input type="password" value={newPin} onChange={e => setNewPin(e.target.value)} className="font-mono" dir="ltr" />
                </div>
                <div>
                  <label className="text-sm text-gray-300 mb-1 block">تأكيد الرمز</label>
                  <input type="password" value={confirmPin} onChange={e => setConfirmPin(e.target.value)} className="font-mono" dir="ltr" />
                </div>
              </div>
              <button onClick={changePin} className="btn-outline-gold rounded-xl px-6 py-2.5 text-sm flex items-center gap-1">
                <Icon name="shield" size={16} /> تغيير الرمز
              </button>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
}

/* ═══════════════ MAIN APP ═══════════════ */
function App() {
  const [ready, setReady] = useState(false);
  const [categories, setCategories] = useState([]);
  const [allProducts, setAllProducts] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [hero, setHero] = useState(DEFAULT_HERO);
  const [activeCat, setActiveCat] = useState('all');
  const [search, setSearch] = useState('');
  const [cart, setCart] = useState([]);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [showCart, setShowCart] = useState(false);
  const [showCheckout, setShowCheckout] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const toast = useToast();

 const loadData = useCallback(() => {
    db.ref('categories').on('value', s => setCategories(s.val() || DEFAULT_CATEGORIES));
    db.ref('settings').on('value', s => setSettings(s.val() || DEFAULT_SETTINGS));
    db.ref('hero').on('value', s => setHero(s.val() || DEFAULT_HERO));
    db.ref('products').on('value', s => {
      const data = s.val() || {};
      let all = [];
      Object.values(data).forEach(arr => { if(Array.isArray(arr)) all = all.concat(arr); });
      setAllProducts(all);
    });
  }, []);

  useEffect(() => {
    (async () => {
      await Storage.init();
      loadData();
      setReady(true);
    })();
  }, [loadData]);

  const filtered = useMemo(() => {
    let list = allProducts;
    if (activeCat !== 'all') list = list.filter(p => p.categoryId === activeCat);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q));
    }
    return list;
  }, [allProducts, activeCat, search]);

  const bestSellers = useMemo(() => allProducts.filter(p => p.bestSeller), [allProducts]);

  const addToCart = (product) => {
    if ((product.stock ?? 0) <= 0) { toast('المنتج غير متوفر', 'error'); return; }
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) {
        if (existing.qty >= product.stock) { toast('وصلت للحد الأقصى من المخزون', 'error'); return prev; }
        return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      }
      return [...prev, { ...product, qty: 1 }];
    });
    toast('تمت الإضافة إلى السلة', 'success');
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const waNumber = settings.whatsappNumber || hero.social?.whatsapp || '213555123456';

  // YouTube embed helper
  const getVideoEmbed = (url) => {
    if (!url) return null;
    if (url.includes('youtube.com/embed')) return url;
    const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
    if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;
    return url;
  };

  if (!ready) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-ink">
        <div className="text-center">
          <div className="w-16 h-16 rounded-full gold-gradient mx-auto mb-4 pulse-gold flex items-center justify-center">
            <span className="font-cairo font-extrabold text-ink text-xl">A</span>
          </div>
          <p className="text-gold font-cairo font-bold">Adrimtex</p>
          <p className="text-gray-500 text-sm mt-1">جاري التحميل...</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-ink pb-safe">
      {/* ═══ HEADER ═══ */}
      <header className="sticky top-0 z-50 bg-ink/95 backdrop-blur-md border-b border-ink-border pt-safe">
        <div className="max-w-8xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
          <div className="flex items-center gap-2">
            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 rounded-lg hover:bg-ink-card lg:hidden">
              <Icon name={menuOpen ? 'x' : 'menu'} size={22} />
            </button>
            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setActiveCat('all'); window.scrollTo(0,0); }}>
              {settings.logo ? (
                <img src={settings.logo} alt="Adrimtex" className="h-9 w-9 rounded-lg object-contain" />
              ) : (
                <div className="w-9 h-9 rounded-lg gold-gradient flex items-center justify-center">
                  <span className="font-cairo font-extrabold text-ink text-sm">A</span>
                </div>
              )}
              <span className="font-cairo font-extrabold text-lg gold-text hidden sm:block">Adrimtex</span>
            </div>
          </div>

          {/* Desktop search */}
          <div className="hidden md:flex flex-1 max-w-md mx-4">
            <div className="relative w-full">
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ابحث عن منتج..." className="!pr-10" />
              <Icon name="search" size={18} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500" />
            </div>
          </div>

          <div className="flex items-center gap-1">
            <button onClick={() => setShowSearch(!showSearch)} className="p-2 rounded-lg hover:bg-ink-card md:hidden">
              <Icon name="search" size={20} />
            </button>
            <button onClick={() => setShowCart(true)} className="p-2 rounded-lg hover:bg-ink-card relative">
              <Icon name="shoppingCart" size={20} />
              {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
            </button>
            <button onClick={() => setShowAdmin(true)} className="p-2 rounded-lg hover:bg-ink-card" title="الإدارة">
              <Icon name="settings" size={20} className="text-gray-500" />
            </button>
          </div>
        </div>

        {/* Mobile search */}
        {showSearch && (
          <div className="px-4 pb-3 md:hidden">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ابحث عن منتج..." autoFocus />
          </div>
        )}

        {/* Mobile menu */}
        {menuOpen && (
          <div className="lg:hidden border-t border-ink-border bg-ink-soft px-4 py-3 space-y-1">
            <button onClick={() => { setActiveCat('all'); setMenuOpen(false); }} className={`block w-full text-right px-3 py-2 rounded-lg text-sm ${activeCat === 'all' ? 'bg-gold/10 text-gold' : 'text-gray-300'}`}>الكل</button>
            {categories.map(c => (
              <button key={c.id} onClick={() => { setActiveCat(c.id); setMenuOpen(false); }} className={`block w-full text-right px-3 py-2 rounded-lg text-sm ${activeCat === c.id ? 'bg-gold/10 text-gold' : 'text-gray-300'}`}>{c.name}</button>
            ))}
          </div>
        )}
      </header>

      {/* ═══ HERO ═══ */}
      {activeCat === 'all' && !search && (
        <section className="hero-glow relative overflow-hidden">
          <div className="max-w-8xl mx-auto px-4 py-12 md:py-20 text-center">
            {/* Logo large */}
            <div className="mb-6 flex justify-center">
              {settings.logo ? (
                <img src={settings.logo} alt="Adrimtex" className="h-24 md:h-32 w-auto object-contain drop-shadow-2xl" />
              ) : (
                <div className="w-24 h-24 md:w-32 md:h-32 rounded-2xl gold-gradient flex items-center justify-center shadow-2xl shadow-gold/20">
                  <span className="font-cairo font-extrabold text-ink text-4xl md:text-5xl">A</span>
                </div>
              )}
            </div>

            <h1 className="font-cairo text-3xl md:text-5xl font-extrabold mb-3">
              <span className="gold-text">{hero.title || 'Adrimtex'}</span>
            </h1>
            <p className="text-gray-300 text-base md:text-lg max-w-2xl mx-auto mb-3 leading-relaxed">{hero.subtitle}</p>
            <p className="text-gray-500 text-sm md:text-base max-w-xl mx-auto mb-8 leading-relaxed">{hero.description}</p>

            {/* Video */}
            {hero.videoUrl && getVideoEmbed(hero.videoUrl) && (
              <div className="max-w-2xl mx-auto mb-8 rounded-2xl overflow-hidden border border-ink-border aspect-video">
                <iframe src={getVideoEmbed(hero.videoUrl)} className="w-full h-full" allowFullScreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" title="فيديو تعريفي" />
              </div>
            )}

            {/* Social + Phones */}
            <div className="flex flex-wrap items-center justify-center gap-3 mb-6">
              {hero.social?.facebook && (
                <a href={hero.social.facebook} target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-ink-card border border-ink-border flex items-center justify-center hover:border-gold hover:text-gold transition-colors">
                  <Icon name="facebook" size={18} />
                </a>
              )}
              {hero.social?.instagram && (
                <a href={hero.social.instagram} target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-ink-card border border-ink-border flex items-center justify-center hover:border-gold hover:text-gold transition-colors">
                  <Icon name="instagram" size={18} />
                </a>
              )}
              {hero.social?.whatsapp && (
                <a href={`https://wa.me/${hero.social.whatsapp}`} target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-[#25D366]/10 border border-[#25D366]/30 flex items-center justify-center text-[#25D366] hover:bg-[#25D366]/20 transition-colors">
                  <WhatsAppIcon size={18} />
                </a>
              )}
              {hero.social?.tiktok && (
                <a href={hero.social.tiktok} target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-ink-card border border-ink-border flex items-center justify-center hover:border-gold hover:text-gold transition-colors">
                  <TikTokIcon size={16} />
                </a>
              )}
            </div>

            {(hero.phones || []).length > 0 && (
              <div className="flex flex-wrap items-center justify-center gap-3">
                {hero.phones.map((ph, i) => (
                  <a key={i} href={`tel:${ph}`} className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-ink-card border border-ink-border text-sm hover:border-gold transition-colors">
                    <Icon name="phone" size={14} className="text-gold" />
                    <span className="font-mono" dir="ltr">{ph}</span>
                  </a>
                ))}
              </div>
            )}
          </div>
        </section>
      )}

      {/* ═══ CATEGORIES BAR ═══ */}
      <div className="sticky top-14 z-40 bg-ink/90 backdrop-blur-md border-b border-ink-border">
        <div className="max-w-8xl mx-auto px-4 py-2.5 flex gap-2 overflow-x-auto">
          <button onClick={() => setActiveCat('all')}
            className={`shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${activeCat === 'all' ? 'gold-gradient text-ink' : 'bg-ink-card text-gray-400 border border-ink-border hover:border-gold/50'}`}>
            الكل
          </button>
          {categories.map(c => (
            <button key={c.id} onClick={() => setActiveCat(c.id)}
              className={`shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold transition-all ${activeCat === c.id ? 'gold-gradient text-ink' : 'bg-ink-card text-gray-400 border border-ink-border hover:border-gold/50'}`}>
              {c.name}
            </button>
          ))}
        </div>
      </div>

      <main className="max-w-8xl mx-auto px-4 py-6">
        {/* Best sellers */}
        {activeCat === 'all' && !search && bestSellers.length > 0 && (
          <section className="mb-10">
            <div className="flex items-center gap-2 mb-4">
              <Icon name="star" size={20} className="text-accent" />
              <h2 className="font-cairo text-xl font-bold">الأكثر مبيعاً</h2>
            </div>
            <div className="product-grid">
              {bestSellers.map(p => (
                <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} onAddCart={addToCart} whatsappNumber={waNumber} />
              ))}
            </div>
          </section>
        )}

        {/* Products */}
        <section>
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-cairo text-xl font-bold">
              {search ? `نتائج البحث (${filtered.length})` :
               activeCat === 'all' ? 'جميع المنتجات' :
               categories.find(c => c.id === activeCat)?.name || 'المنتجات'}
            </h2>
            <span className="text-xs text-gray-500 font-mono">{filtered.length} منتج</span>
          </div>

          {filtered.length === 0 ? (
            <div className="text-center py-16 text-gray-500">
              <Icon name="package" size={48} className="mx-auto mb-3 opacity-30" />
              <p>لا توجد منتجات{search ? ' مطابقة لبحثك' : ''}</p>
            </div>
          ) : (
            <div className="product-grid">
              {filtered.map(p => (
                <ProductCard key={p.id} product={p} onOpen={setSelectedProduct} onAddCart={addToCart} whatsappNumber={waNumber} />
              ))}
            </div>
          )}
        </section>
      </main>

      {/* ═══ FOOTER ═══ */}
      <footer className="border-t border-ink-border mt-12 pb-safe">
        <div className="max-w-8xl mx-auto px-4 py-8 text-center">
          <div className="flex items-center justify-center gap-2 mb-3">
            {settings.logo ? (
              <img src={settings.logo} alt="" className="h-8 w-8 rounded object-contain" />
            ) : (
              <div className="w-8 h-8 rounded gold-gradient flex items-center justify-center">
                <span className="font-cairo font-extrabold text-ink text-xs">A</span>
              </div>
            )}
            <span className="font-cairo font-bold gold-text">Adrimtex</span>
          </div>
          <p className="text-gray-500 text-sm mb-4">أدوات الخياطة • المستلزمات المنزلية • الإكسسوارات</p>
          <div className="flex items-center justify-center gap-3 mb-4">
            {hero.social?.facebook && <a href={hero.social.facebook} target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-gold"><Icon name="facebook" size={18} /></a>}
            {hero.social?.instagram && <a href={hero.social.instagram} target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-gold"><Icon name="instagram" size={18} /></a>}
            {hero.social?.whatsapp && <a href={`https://wa.me/${hero.social.whatsapp}`} target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-[#25D366]"><WhatsAppIcon size={18} /></a>}
            {hero.social?.tiktok && <a href={hero.social.tiktok} target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-gold"><TikTokIcon size={16} /></a>}
          </div>
          <p className="text-gray-600 text-xs">© {new Date().getFullYear()} Adrimtex — جميع الحقوق محفوظة</p>
          <p className="text-gray-700 text-[10px] mt-1">صُنع في الجزائر 🇩🇿</p>
        </div>
      </footer>

      {/* Floating cart button (mobile) */}
      {cartCount > 0 && (
        <button onClick={() => setShowCart(true)}
          className="fixed bottom-6 left-6 z-50 btn-gold rounded-full w-14 h-14 flex items-center justify-center shadow-lg shadow-gold/30 pulse-gold md:hidden"
          style={{ bottom: 'calc(24px + var(--safe-bottom))' }}>
          <Icon name="shoppingCart" size={22} />
          <span className="cart-badge !top-0 !left-0">{cartCount}</span>
        </button>
      )}

      {/* Modals */}
      {selectedProduct && (
        <ProductDetail
          product={selectedProduct}
          onClose={() => setSelectedProduct(null)}
          onAddCart={(p) => { addToCart(p); }}
          whatsappNumber={waNumber}
        />
      )}

      <CartModal
        open={showCart}
        onClose={() => setShowCart(false)}
        cart={cart}
        setCart={setCart}
        onCheckout={() => { setShowCart(false); setShowCheckout(true); }}
      />

      <CheckoutModal
        open={showCheckout}
        onClose={() => setShowCheckout(false)}
        cart={cart}
        setCart={setCart}
        settings={settings}
        onOrderComplete={loadData}
      />

      <AdminPanel
        open={showAdmin}
        onClose={() => setShowAdmin(false)}
        onDataChange={loadData}
      />
    </div>
  );
}

/* ═══════════════ RENDER ═══════════════ */
function Root() {
  return (
    <ToastProvider>
      <App />
    </ToastProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);
</script>
</body>
</html>
```
