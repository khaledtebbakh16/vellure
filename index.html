    <style>
        /* ===== CUSTOM STYLES ===== */
        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --primary-light: #8B83FF;
            --gold: #FFD700;
            --gold-dark: #E6C200;
            --ink: #0A0A0A;
            --ink-soft: #141414;
            --ink-card: #1A1A1A;
            --ink-border: #2A2A2A;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }
        * {
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            background: var(--ink);
            color: #F5F5F5;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--ink-soft);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Gradients & Text */
        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-bg {
            background: linear-gradient(135deg, var(--primary), var(--gold-dark));
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0A0A;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .btn-gold:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }
        .btn-outline-primary {
            border: 2px solid var(--primary);
            color: var(--primary);
            background: transparent;
            transition: all 0.25s ease;
        }
        .btn-outline-primary:hover {
            background: rgba(108, 99, 255, 0.1);
        }
        .border-primary {
            border-color: var(--primary);
        }
        .bg-primary {
            background: var(--primary);
        }

        /* Hero BG with particles */
        .hero-bg {
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 0%, rgba(108, 99, 255, 0.12) 0%, transparent 60%);
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236C63FF' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
            pointer-events: none;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.15);
            animation: floatUp 8s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120px) scale(1.2);
                opacity: 0;
            }
        }

        /* Order Now Button pulse */
        .btn-order-now {
            animation: orderPulse 2s infinite;
        }
        @keyframes orderPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.5);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 215, 0, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
            }
        }

        /* Product Cards */
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--ink-border);
            background: var(--ink-card);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(108, 99, 255, 0.15);
            border-color: var(--primary);
        }
        .product-card .add-to-cart {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }
        .product-card:hover .add-to-cart {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating cart */
        .floating-cart {
            position: fixed;
            bottom: calc(24px + var(--safe-bottom));
            left: 24px;
            z-index: 999;
            animation: pulse-primary 2s infinite;
        }
        @keyframes pulse-primary {
            0% {
                box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.5);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(108, 99, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(108, 99, 255, 0);
            }
        }

        /* Step dots */
        .step-dot.active {
            background: var(--primary);
            color: #fff;
        }
        .step-done {
            background: var(--primary-dark);
            color: #fff;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(24px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: var(--ink-card);
            border: 1px solid var(--primary);
            padding: 12px 24px;
            border-radius: 12px;
            animation: slideUp 0.3s ease;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .toast.error {
            border-color: #FF6B35;
        }
        .toast.success {
            border-color: #4ADE80;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) translateX(-50%);
            }
            to {
                opacity: 1;
                transform: translateY(0) translateX(-50%);
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }
        .modal-panel {
            background: var(--ink-card);
            border: 1px solid var(--ink-border);
            border-radius: 20px;
            max-width: 640px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: scaleUp 0.3s ease;
        }
        .modal-panel.wide {
            max-width: 960px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes scaleUp {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Lazy */
        .lazy-img {
            opacity: 0;
            transition: opacity 0.4s;
        }
        .lazy-img.loaded {
            opacity: 1;
        }

        /* Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (min-width: 640px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (min-width: 1280px) {
            .product-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* Badges */
        .badge-primary {
            background: var(--primary);
            color: #fff;
        }
        .badge-gold {
            background: var(--gold);
            color: #0A0A0A;
        }

        /* Admin tabs */
        .admin-tab {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .admin-tab.active {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
        }

        /* Status */
        .status-pending {
            background: #3A3A1A;
            color: #F0D77B;
        }
        .status-confirmed {
            background: #1A3A2A;
            color: #4ADE80;
        }
        .status-shipping {
            background: #1A2A3A;
            color: #60A5FA;
        }
        .status-delivered {
            background: #1A3A1A;
            color: #22C55E;
        }
        .status-cancelled {
            background: #3A1A1A;
            color: #EF4444;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 280px;
            background: var(--ink-card);
            border-left: 1px solid var(--ink-border);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 60;
            padding-top: var(--safe-top);
            overflow-y: auto;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 55;
            display: none;
        }
        .sidebar-overlay.open {
            display: block;
        }

        .pb-safe {
            padding-bottom: calc(16px + var(--safe-bottom));
        }
        .pt-safe {
            padding-top: calc(8px + var(--safe-top));
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== SOCIAL ICONS WITH BETTER VISIBILITY ===== */
        .social-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .social-icon-wrapper:hover {
            transform: scale(1.12) translateY(-3px);
            border-color: var(--gold);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.3);
        }
        .social-icon-wrapper .social-icon {
            width: 26px;
            height: 26px;
            transition: all 0.3s ease;
        }
        .social-icon-wrapper:hover .social-icon {
            transform: scale(1.1);
        }

        /* Icon colors with high contrast */
        .social-icon-fb {
            color: #1877F2;
            fill: #1877F2;
        }
        .social-icon-ig {
            color: #E4405F;
            fill: #E4405F;
        }
        .social-icon-wa {
            color: #25D366;
            fill: #25D366;
        }
        .social-icon-tt {
            color: #FFFFFF;
            fill: #FFFFFF;
        }

        /* Make icons in header more visible */
        .header-icon {
            color: #E0E0E0;
            transition: color 0.2s;
        }
        .header-icon:hover {
            color: var(--gold);
        }

        /* Order now icon */
        .order-icon {
            color: #0A0A0A;
        }

        /* ===== FIX: Ensure text is readable on any background ===== */
        .text-on-dark {
            color: #F5F5F5;
        }
        .text-on-light {
            color: #0A0A0A;
        }
        /* Sidebar items always dark background, light text */
        .sidebar .sidebar-item {
            color: #E0E0E0;
        }
        .sidebar .sidebar-item:hover {
            background: rgba(108, 99, 255, 0.15);
            color: var(--primary-light);
        }
        .sidebar .sidebar-item.active {
            background: rgba(108, 99, 255, 0.2);
            color: var(--gold);
        }
        /* Input fields - ensure dark text on light background if any */
        input,
        select,
        textarea {
            background: #1A1A1A !important;
            color: #F5F5F5 !important;
            border: 1px solid #2A2A2A !important;
        }
        input::placeholder,
        textarea::placeholder {
            color: #888;
        }
        /* If any light background appears, force dark text */
        .bg-white,
        .bg-gray-100,
        .bg-gray-200,
        .bg-gray-50 {
            color: #0A0A0A !important;
        }
        .bg-white *:not(.btn-gold):not(.btn-primary):not(.badge-gold):not(.badge-primary),
        .bg-gray-100 *:not(.btn-gold):not(.btn-primary):not(.badge-gold):not(.badge-primary) {
            color: #0A0A0A !important;
        }
    </style>
</head>

        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);
            const show = useCallback((message, type = 'info') => {
                const id = Date.now();
                setToasts(t => [...t, { id, message, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
            }, []);
            return ( <ToastContext.Provider value={show}>
                {children}
                {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>)}
            </ToastContext.Provider>
            );

        // ============================================================
        //  LAZY IMAGE
        // ============================================================
        function LazyImage({ src, alt, className = '', ...props }) {
            const ref = useRef(null);
            const [loaded, setLoaded] = useState(false);
            const [inView, setInView] = useState(false);
            const actualSrc = src || PLACEHOLDER_IMG;
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                if (!('IntersectionObserver' in window)) { setInView(true); return; }
                const obs = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setInView(true);
                        obs.disconnect(); }
                }, { rootMargin: '100px' });
                obs.observe(el);
                return () => obs.disconnect();
            }, []);
            return ( <img ref={ref} src={inView ? actualSrc : PLACEHOLDER_IMG} alt={alt || ''} loading="lazy" className={`lazy-img ${loaded ? 'loaded' : ''} ${className}`} onLoad={() => setLoaded(true)} onError={(e) => { e.target.src = PLACEHOLDER_IMG;
                    setLoaded(true); }} {...props} />
            );
        }

            return ( <div className={`modal-overlay ${className}`} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>

                        <div className="space-y-3 max-h-96 overflow-y-auto">
